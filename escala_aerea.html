<style>
  /* Reset e base */
  body { 
    background: transparent !important; /* Transparente para integrar ao Docsify */
    color: #e2e8f0; 
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    display: flex;
    justify-content: center;
    padding: 20px;
  }

  /* Painel principal */
  .container {
    display: flex;
    gap: 20px;
    width: 100%;
    max-width: 900px;
  }

  .painel { 
    background: #1a202c; 
    padding: 24px; 
    border-radius: 12px; 
    flex: 1;
    border: 1px solid #2d3748;
    box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.3);
  }

  .painel-lateral { 
    background: #1a202c; 
    padding: 24px; 
    border-radius: 12px; 
    width: 300px;
    border: 1px solid #2d3748;
  }

  /* Inputs e Selects estilizados */
  h3 { margin-top: 0; color: #f0a500; font-size: 1.2rem; }
  
  input, select { 
    width: 100%; 
    padding: 12px; 
    margin: 10px 0; 
    border-radius: 6px; 
    background: #252c3a; 
    color: white; 
    border: 1px solid #4a5568; 
    box-sizing: border-box;
  }

  button { 
    width: 100%; 
    padding: 14px; 
    border: none; 
    border-radius: 6px; 
    font-weight: bold; 
    cursor: pointer; 
    margin-top: 15px;
    transition: transform 0.1s, background 0.2s;
  }

  button:hover { transform: translateY(-2px); }
  
  #btnIn { background: #2f855a; color: white; }
  #btnOut { background: #c53030; color: white; }

  /* Lista de ativos */
  .item-ativo { 
    border-left: 3px solid #f0a500; 
    padding: 10px; 
    margin-bottom: 10px; 
    background: #252c3a; 
    border-radius: 0 4px 4px 0;
  }
</style>
