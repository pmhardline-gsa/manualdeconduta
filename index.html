<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>1º BPM - HARDLINE</title>
  <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
  <meta name="description" content="Efetivo PMHL">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0">
  
  <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify@4/lib/themes/dark.css">
  
  <style>
    :root {
      --theme-color: #f0a500;
    }
    body { background-color: #0b0e14 !important; }
    .sidebar { background-color: #141923 !important; border-right: 1px solid #232b3c !important; }
    .markdown-section { max-width: 1200px !important; padding: 30px !important; }
    
    /* Logo e Sidebar */
    .sidebar .app-name img {
      max-width: 140px !important;
      height: auto !important;
      margin: 15px auto 5px auto !important;
      display: block !important;
      filter: drop-shadow(0px 4px 6px rgba(0, 0, 0, 0.6));
    }

    /* Estilo para Organogramas e Listas */
    .markdown-section ul { list-style-type: none; padding-left: 0; }
    .markdown-section ul li { 
      background: #1a202c; 
      margin: 8px 0; 
      padding: 12px; 
      border-radius: 6px; 
      border: 1px solid #2d3748;
    }

    /* Estilo para Tabelas e Cronogramas */
    .markdown-section table { width: 100%; border-collapse: collapse; background: #1a202c; }
    .markdown-section th { background-color: #2d3748; color: #f0a500; padding: 12px; }
    .markdown-section td { padding: 12px; border-bottom: 1px solid #2d3748; }

    /* Container para Iframe da Escala */
    .escala-container {
      width: 100%;
      border-radius: 12px;
      overflow: hidden;
      border: 1px solid #2d3748;
      box-shadow: 0 4px 15px rgba(0,0,0,0.5);
    }
  </style>
</head>
<body>
  <div id="app"></div>
  
  <script>
    window.$docsify = {
      name: '1º BPM - HARDLINE',
      logo: 'logo.png',
      loadSidebar: true,
      subMaxLevel: 2,
      executeScript: true,
      auto2top: true,
      routerMode: 'hash',
      // Melhora a compatibilidade com iframes e scripts externos
      plugins: [
        function(hook) {
          hook.doneEach(function() {
            // Garante que o Docsify processe o conteúdo corretamente
          });
        }
      ]
    }
  </script>

  <script src="//cdn.jsdelivr.net/npm/docsify/lib/docsify.min.js"></script>
</body>
</html>
