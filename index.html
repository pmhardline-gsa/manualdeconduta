<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Manual de Conduta - PMHL</title>
  <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
  <meta name="description" content="Manual de Conduta da Polícia Militar Hardline.">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0">
  
  <!-- Tema Escuro Oficial do Docsify -->
  <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify@4/lib/themes/dark.css">
  
  <style>
    /* Customização de cores para o padrão da PMHL (Preto e Dourado) */
    :root {
      --theme-color: #f0a500; /* Cor dos links e destaques em tom dourado */
    }
    .sidebar {
      background-color: #1c1f24 !important; /* Fundo do menu lateral esquerdo */
    }
    body {
      background-color: #111417 !important; /* Fundo principal da página */
    }
    
    /* BLOQUEIO E AJUSTE DA LOGO FIXA (SEM LINK) */
    .sidebar .app-name-link {
      pointer-events: none; /* Desativa o clique */
      cursor: default;      /* Remove o ponteiro de link */
      text-decoration: none;
    }
    .sidebar .app-name-link img {
      max-width: 100px; /* Controla a largura máxima da logo */
      height: auto;
      display: block;
      margin: 20px auto 10px auto; /* Centraliza a imagem e dá espaço para o texto */
    }
    .sidebar .app-name {
      text-align: center;
      font-size: 22px;
      font-weight: bold;
      color: #ffffff;
      display: block;
      margin-bottom: 20px;
    }

    /* Estilização para o bloco de notas/alerta azul (Callout) */
    blockquote {
      background-color: #16222f !important;
      border-left-color: #4a90e2 !important;
      color: #b0c4de !important;
      padding: 15px !important;
      border-radius: 4px;
    }
  </style>
</head>
<body>
  <div id="app">Carregando o manual da PMHL...</div>
  
  <script>
    window.$docsify = {
      name: 'PMHL',
      repo: '',
      
      // Puxa a logo salva no seu repositório do GitHub
      logo: 'logo.png', 
      
      loadSidebar: true,
      subMaxLevel: 2,
      homepage: 'manualdeconduta.md',
      alias: {
        '/.*/_sidebar.md': '_sidebar.md',
        '/_sidebar.md': '_sidebar.md',
        '/': 'manualdeconduta.md'
      }
    }
  </script>
  
  <!-- Scripts de funcionamento do Docsify -->
  <script src="//cdn.jsdelivr.net/npm/docsify@4"></script>
</body>
</html>
