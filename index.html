<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>1º BPM - HARDLINE</title>
  <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
  <meta name="description" content="Efetivo PMHL">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0">
  
  <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify@4/lib/themes/dark.css">
  
  <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
  
  <style>
    :root {
      --theme-color: #f0a500;
    }
    body {
      background-color: #0b0e14 !important;
    }
    .sidebar {
      background-color: #141923 !important;
      border-right: 1px solid #232b3c !important;
    }
    .markdown-section {
      max-width: 1200px !important;
      padding: 30px !important;
    }
    
    /* Configuração para o logo aparecer centralizado e bonito na barra lateral */
    .sidebar .app-name img {
      max-width: 140px !important;
      height: auto !important;
      margin: 15px auto 5px auto !important;
      display: block !important;
      filter: drop-shadow(0px 4px 6px rgba(0, 0, 0, 0.6));
    }
  </style>
</head>
<body>
  <div id="app"></div>
  <script>
    window.$docsify = {
      name: '1º BPM - HARDLINE',
      logo: 'logo.png',
      loadSidebar: true,
      subMaxLevel: 0, // Mantido em 0 para controle manual via _sidebar.md
      executeScript: true,
      auto2top: true,
      routerMode: 'hash'
    }
  </script>
</body>
</html>
