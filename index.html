<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>1º BPM - HARDLINE</title>
  <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
  <meta name="description" content="Efetivo PMHL">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0">
  
  <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify@4/lib/themes/dark.css">
  
  <style>
    :root { --theme-color: #f0a500; }
    body { background-color: #0b0e14 !important; }
    .sidebar { background-color: #141923 !important; border-right: 1px solid #232b3c !important; }
    .markdown-section { max-width: 1200px !important; padding: 30px !important; }
    
    .sidebar .app-name img {
      max-width: 140px !important;
      margin: 15px auto 5px auto !important;
      display: block !important;
      filter: drop-shadow(0px 4px 6px rgba(0, 0, 0, 0.6));
    }

    /* Estilo de Listas e Organogramas */
    .markdown-section ul { list-style-type: none; padding-left: 0; }
    .markdown-section ul li { background: #1a202c; margin: 8px 0; padding: 12px; border-radius: 6px; border: 1px solid #2d3748; }

    /* Estilo de Tabelas */
    .markdown-section table { width: 100%; border-collapse: collapse; background: #1a202c; }
    .markdown-section th { background-color: #2d3748; color: #f0a500; padding: 12px; }
    .markdown-section td { padding: 12px; border-bottom: 1px solid #2d3748; }

    /* Cards de Hierarquia (Organograma) */
    .org-chart { display: flex; flex-direction: column; align-items: center; margin: 20px 0; }
    .card { background: #1a202c; border: 1px solid #4a5568; padding: 15px; border-radius: 8px; width: 280px; text-align: center; margin-bottom: 10px; border-top: 4px solid #cbd5e0; }
    .commander { border-top: 4px solid #f0a500; }
    .branches { display: flex; gap: 20px; margin-top: 10px; flex-wrap: wrap; justify-content: center; }

    /* Container Escala */
    .escala-container { width: 100%; border-radius: 12px; overflow: hidden; border: 1px solid #2d3748; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
  </style>
</head>
<body>
  <div id="app"></div>
  
  <script>
    window.$docsify = {
      name: '1º BPM - HARDLINE',
      logo: 'logo.png',
      loadSidebar: true,
      subMaxLevel: 2,
      executeScript: true,
      auto2top: true,
      routerMode: 'hash'
    }
  </script>

  <script src="//cdn.jsdelivr.net/npm/docsify/lib/docsify.min.js"></script>
</body>
</html>
