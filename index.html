<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Manual de Conduta - PMHL</title>
  <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
  <meta name="description" content="Manual de Conduta da Polícia Militar Hardline.">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0">
  
  <!-- Importação da fonte oficial Inter (estilo GitBook) -->
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap">
  
  <!-- Tema Escuro Oficial do Docsify -->
  <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify@4/lib/themes/dark.css">
  
  <style>
    /* Configuração de Cores Globais */
    :root {
      --theme-color: #f0a500; /* Dourado para links e destaques */
    }
    .sidebar {
      background-color: #1c1f24 !important; /* Fundo do menu lateral */
    }
    body {
      background-color: #111417 !important; /* Fundo principal */
    }
    
    /* ========================================================
       CONFIGURAÇÃO EXATA DA FONTE E PARÁGRAFOS (IGUAL AO PRINT)
       ======================================================== */
    .markdown-section p, .markdown-section li {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif !important;
      font-size: 16px !important;       /* Tamanho exato do parágrafo */
      line-height: 1.625 !important;    /* Espaçamento perfeito entre linhas */
      color: #9aa5b1 !important;        /* Tom de cinza azulado fosco */
      font-weight: 400 !important;      /* Peso normal da fonte */
    }

    /* Ajuste para o texto em Itálico (Lema da Harpia) */
    .markdown-section em {
      color: #cbd5e1 !important;        /* Deixa o itálico um pouco mais claro */
    }

    /* Título das Diretrizes (###) */
    .markdown-section h4 {
      font-family: 'Inter', sans-serif !important;
      font-size: 20px !important;
      font-weight: 600;
      color: #ffffff !important;
      margin-top: 30px;
    }

    /* Nome do Comando (####) */
    .markdown-section h4 {
      font-family: 'Inter', sans-serif !important;
      font-size: 15px !important;       /* Tamanho menor e elegante para a assinatura */
      font-weight: 600;
      color: #e2e8f0 !important;
      margin-top: 25px;
    }
    /* ======================================================== */

    /* Customização da Logo na Barra Lateral */
    .sidebar .app-name-link img {
      max-width: 100px;
      height: auto;
      display: block;
      margin: 20px auto 10px auto;
    }
    .sidebar .app-name {
      text-align: center;
      font-size: 22px;
      font-weight: bold;
      color: #ffffff;
      display: block;
      margin-bottom: 20px;
    }

    /* Caixa de Alerta Azul (Callout) */
    blockquote {
      background-color: #16222f !important;
      border-left-color: #4a90e2 !important;
      color: #b0c4de !important;
      padding: 15px !important;
      border-radius: 4px;
      margin: 20px 0;
    }
  </style>
</head>
<body>
  <div id="app">Carregando o manual da PMHL...</div>
  
  <script>
    window.$docsify = {
      name: 'PMHL',
      repo: '',
      
      // Caminho da sua logo salva no repositório
      logo: 'logo.png', 
      
      loadSidebar: true,
      subMaxLevel: 2,
      homepage: 'manualdeconduta.md',
      alias: {
        '/.*/_sidebar.md': '_sidebar.md',
        '/_sidebar.md': '_sidebar.md',
        '/': 'manualdeconduta.md'
      }
    }
  </script>
  
  <!-- Scripts do Docsify -->
  <script src="//cdn.jsdelivr.net/npm/docsify@4"></script>
</body>
</html>
