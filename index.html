<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>1º BPM - HARDLINE</title>
  <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  
  <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify@4/lib/themes/dark.css">
  
  <style>
    :root { 
      --theme-color: #f0a500; 
      --bg-dark: #0b0e14;
    }
    body { background-color: var(--bg-dark) !important; color: #e2e8f0; }

    /* Sidebar */
    .sidebar { background: #141923 !important; border-right: 1px solid #232b3c !important; }
    .sidebar .app-name img { 
      max-width: 140px; margin: 15px auto; display: block; 
      filter: drop-shadow(0px 4px 6px rgba(0, 0, 0, 0.6)); 
    }

    /* Estilo Dashboard Tático */
    .tactical-dashboard { display: flex; flex-direction: column; align-items: center; gap: 10px; margin-top: 20px; }
    
    .commander-node { background: linear-gradient(90deg, #f0a500, #b7791f); padding: 20px; border-radius: 12px; display: flex; align-items: center; gap: 20px; width: 350px; color: black; box-shadow: 0 4px 15px rgba(240, 165, 0, 0.3); }
    .supervisor-node { background: #2d3748; padding: 15px; border-radius: 8px; width: 300px; text-align: center; border: 1px solid #f0a500; }

    .branch-container { display: flex; gap: 20px; margin-top: 20px; flex-wrap: wrap; justify-content: center; }
    .unit-card { background: rgba(26, 32, 44, 0.8); border: 1px solid #4a5568; border-radius: 12px; width: 280px; overflow: hidden; }
    .unit-header { background: #1a202c; padding: 15px; text-align: center; font-weight: bold; color: #f0a500; border-bottom: 2px solid #f0a500; }
    
    .rank-item { padding: 12px; border-bottom: 1px solid #2d3748; display: flex; align-items: center; gap: 10px; }
    .veteran { color: #f6e05e; } 
    .officer { color: #63b3ed; } 
    .recruit { color: #a0aec0; }

    /* Container Escala */
    .escala-container { width: 100%; border-radius: 12px; overflow: hidden; border: 1px solid #2d3748; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
  </style>
</head>
<body>
  <div id="app"></div>
  <script>
    window.$docsify = {
      name: '1º BPM - HARDLINE',
      logo: 'logo.png',
      loadSidebar: true,
      subMaxLevel: 2,
      executeScript: true,
      auto2top: true,
      routerMode: 'hash'
    }
  </script>
  <script src="//cdn.jsdelivr.net/npm/docsify/lib/docsify.min.js"></script>
</body>
</html>
