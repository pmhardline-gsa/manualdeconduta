<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Cadastro de Oficial - GSA</title>
  <style>
    body { background-color: #0f131a; color: white; font-family: sans-serif; display: flex; justify-content: center; padding-top: 50px; }
    form { background: #141923; padding: 25px; border-radius: 8px; width: 350px; border: 1px solid #232b3c; }
    input, select { width: 100%; padding: 10px; margin: 8px 0; background: #1c2434; border: 1px solid #232b3c; color: white; box-sizing: border-box; border-radius: 4px; }
    button { width: 100%; padding: 12px; background: #f0a500; border: none; font-weight: bold; cursor: pointer; color: black; margin-top: 10px; border-radius: 4px; }
    button:hover { background: #d49000; }
  </style>
</head>
<body>

  <form action="https://api.sheetmonkey.io/form/uNobqNddXgQBDmBA4hVzMF" method="POST">
    <h2 style="color: #f0a500; text-align: center;">Novo Cadastro</h2>
    
    <!-- ID: Somente números -->
    <input type="number" name="ID" placeholder="ID (Apenas números)" required>
    
    <!-- Nome -->
    <input type="text" name="Nome" placeholder="Nome do Policial" required>
    
    <!-- Badge: Somente números -->
    <input type="number" name="Badge" placeholder="Número da Badge (Apenas números)" required>
    
    <!-- Patente: Menu com opções -->
    <select name="Patente" required>
        <option value="" disabled selected>Selecione a Patente</option>
        <option value="CMD.GERAL">CMD.GERAL</option>
        <option value="CMD.SUBCOMANDO">CMD.SUBCOMANDO</option>
        <option value="CAPITAO">CAPITAO</option>
        <option value="TENENTE">TENENTE</option>
        <option value="SARGENTO">SARGENTO</option>
        <option value="CABO">CABO</option>
        <option value="SOLDADO">SOLDADO</option>
    </select>
    
    <!-- Unidade -->
    <input type="text" name="Unidade" placeholder="Unidade" value="GSA" required>
    
    <!-- Redirecionamento: Substitua pelo link real da sua página de membros -->
    <input type="hidden" data-sheetmonkey-redirect value="https://pmhardline-gsa.github.io/manualdeconduta/membros.html">
    
    <button type="submit">Cadastrar Oficial</button>
  </form>

</body>
</html>
