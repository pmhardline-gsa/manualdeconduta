<!DOCTYPE html>
<html lang="pt-BR">
<body style="background-color: #0f131a; color: white; font-family: sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0;">

  <form id="meuForm" style="background: #141923; padding: 25px; border-radius: 8px; border: 1px solid #232b3c; width: 350px; display: flex; flex-direction: column; gap: 15px;">
    
    <h2 style="color: #f0a500; text-align: center; margin: 0;">Novo Cadastro GSA</h2>
    
    <input type="number" name="ID" placeholder="ID" required style="padding: 12px; background: #1c2434; border: 1px solid #232b3c; color: white; border-radius: 4px;">
    <input type="text" name="Nome" placeholder="Nome" required style="padding: 12px; background: #1c2434; border: 1px solid #232b3c; color: white; border-radius: 4px;">
    <input type="number" name="Badge" placeholder="Badge" required style="padding: 12px; background: #1c2434; border: 1px solid #232b3c; color: white; border-radius: 4px;">
    
    <select name="Patente" required style="padding: 12px; background: #1c2434; border: 1px solid #232b3c; color: white; border-radius: 4px;">
        <option value="" disabled selected>Selecione a Patente</option>
        
        <optgroup label="--- CADEIA DE COMANDO ---" style="color: #f0a500;">
            <option value="COMANDO">COMANDO</option>
            <option value="SUB-COMANDO">SUB-COMANDO</option>
        </optgroup>

        <optgroup label="--- QUADRO DE PILOTOS ---" style="color: #f0a500;">
            <option value="Piloto Veterano">1. Piloto Veterano</option>
            <option value="Piloto Sênior">2. Piloto Sênior</option>
            <option value="Piloto Oficial">3. Piloto Oficial</option>
            <option value="Piloto Estagiário">4. Piloto Estagiário</option>
            <option value="Aspirante a Piloto">5. Aspirante a Piloto</option>
        </optgroup>
        
        <optgroup label="--- QUADRO DE OPERADORES ---" style="color: #f0a500;">
            <option value="Operador Veterano">1. Operador Veterano</option>
            <option value="Operador Sênior">2. Operador Sênior</option>
            <option value="Operador Oficial">3. Operador Oficial</option>
            <option value="Tripulante Operacional">4. Tripulante Operacional</option>
            <option value="Aspirante Operador">5. Aspirante Operador</option>
        </optgroup>
    </select>
    
    <input type="password" id="senha" placeholder="Senha de acesso" required style="padding: 12px; background: #1c2434; border: 1px solid #232b3c; color: white; border-radius: 4px;">
    
    <button type="submit" id="btn" style="padding: 12px; background: #f0a500; border: none; font-weight: bold; cursor: pointer; border-radius: 4px; color: black;">Cadastrar Oficial</button>
    
    <a href="LINK_DA_SUA_PLANILHA" target="_blank" style="text-align: center; color: #777; text-decoration: none; font-size: 13px;">Voltar para a Planilha</a>
    
    <div id="msg" style="text-align: center; font-weight: bold; min-height: 20px;"></div>
  </form>

  <script>
    document.getElementById('meuForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const senhaCorreta = "123456"; // Altere para sua senha
      const senhaDigitada = document.getElementById('senha').value;
      const msg = document.getElementById('msg');
      const btn = document.getElementById('btn');

      if (senhaDigitada !== senhaCorreta) {
        msg.textContent = "Senha incorreta!";
        msg.style.color = "#ff4d4d";
        return;
      }

      btn.disabled = true;
      msg.textContent = "Enviando dados...";
      msg.style.color = "#f0a500";
      
      const formData = new FormData(e.target);
      await fetch('https://api.sheetmonkey.io/form/uNobqNddXgQBDmBA4hVzMF', {
        method: 'POST',
        body: formData
      });

      msg.textContent = "Cadastro concluído com sucesso!";
      msg.style.color = "#4CAF50";
      btn.disabled = false;
      e.target.reset();
    });
  </script>
</body>
</html>
