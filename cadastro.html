<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cadastro de Membros - 1º BPM</title>
  <style>
    body {
      background-color: #0f131a;
      color: #ffffff;
      font-family: sans-serif;
      margin: 0;
      padding: 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      box-sizing: border-box;
    }
    .container {
      background-color: #141923;
      border: 1px solid #232b3c;
      padding: 30px;
      border-radius: 8px;
      width: 100%;
      max-width: 500px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.5);
      display: none;
    }
    h2 {
      color: #f0a500;
      text-align: center;
      margin-top: 0;
      margin-bottom: 25px;
      letter-spacing: 1px;
    }
    .form-group {
      margin-bottom: 20px;
    }
    label {
      display: block;
      margin-bottom: 8px;
      color: #a0aec0;
      font-size: 14px;
      font-weight: bold;
    }
    input, select {
      width: 100%;
      padding: 10px;
      background-color: #1c2434;
      border: 1px solid #232b3c;
      color: #ffffff;
      border-radius: 4px;
      box-sizing: border-box;
      font-size: 14px;
    }
    input:focus, select:focus {
      outline: none;
      border-color: #f0a500;
    }
    .btn-submit {
      background-color: #f0a500;
      color: #000000;
      border: none;
      padding: 12px;
      width: 100%;
      font-weight: bold;
      font-size: 16px;
      border-radius: 4px;
      cursor: pointer;
    }
    .btn-submit:hover {
      background-color: #b8860b;
    }
    .btn-back {
      display: block;
      text-align: center;
      margin-top: 15px;
      color: #718096;
      text-decoration: none;
      font-size: 14px;
    }
    .success-msg {
      background-color: #236b43;
      color: white;
      padding: 10px;
      border-radius: 4px;
      text-align: center;
      margin-bottom: 20px;
      display: none;
      font-weight: bold;
    }
  </style>
</head>
<body>

  <div class="container" id="conteudo-cadastro">
    <h2>Ficha de Cadastro Operacional</h2>
    <div id="msg-sucesso" class="success-msg">Membro cadastrado com sucesso!</div>

    <form id="form-cadastro">
      <div class="form-group">
        <label for="id-membro">ID do Policial</label>
        <input type="number" id="id-membro" required placeholder="Ex: 88">
      </div>
      <div class="form-group">
        <label for="nome-membro">Nome Operacional</label>
        <input type="text" id="nome-membro" required placeholder="Ex: Gabriel Rodrigues">
      </div>
      <div class="form-group">
        <label for="badge-membro">Número da Badge</label>
        <input type="text" id="badge-membro" placeholder="Ex: 712">
      </div>
      <div class="form-group">
        <label for="patente-membro">Patente / Cargo</label>
        <select id="patente-membro" required>
          <option value="" disabled selected>Selecione...</option>
          <option value="Comando Geral">Comando Geral</option>
          <option value="Sub Comando">Sub Comando</option>
          <option value="Comando RPM">Comando RPM</option>
          <option value="Comando SPEED">Comando SPEED</option>
          <option value="Comando GTM">Comando GTM</option>
          <option value="Comando GSA">Comando GSA</option>
          <option value="Comando SWAT">Comando SWAT</option>
          <option value="1º Sargento">1º Sargento</option>
          <option value="2º Sargento">2º Sargento</option>
          <option value="3º Sargento">3º Sargento</option>
          <option value="Cabo">Cabo</option>
          <option value="Soldado">Soldado</option>
        </select>
      </div>
      <div class="form-group">
        <label for="unidade-membro">Unidade / Grupamento</label>
        <select id="unidade-membro" required>
          <option value="" disabled selected>Selecione...</option>
          <option value="RPM">RPM</option>
          <option value="SPEED">SPEED</option>
          <option value="GTM">GTM</option>
          <option value="GSA">GSA</option>
          <option value="SWAT">SWAT</option>
        </select>
      </div>
      <button type="submit" class="btn-submit">Inserir no Efetivo</button>
    </form>
    <a href="membros.html" class="btn-back">⬅ Voltar para a Planilha</a>
  </div>

  <script>
    const SENHA_CORRETA = "COMANDO1BPM"; 

    // Bloqueio de segurança por senha ao carregar a página
    document.addEventListener("DOMContentLoaded", function() {
      const senhaDigitada = prompt("Digite a senha de Comando para acessar o cadastro:");
      if (senhaDigitada === SENHA_CORRETA) {
        document.getElementById("conteudo-cadastro").style.display = "block";
      } else {
        alert("Acesso negado!");
        window.location.href = "membros.html";
      }
    });

    // Envio dos dados para o LocalStorage
    document.getElementById("form-cadastro").addEventListener("submit", function(e) {
      e.preventDefault();

      // Pega a data e hora atual do momento do cadastro no formato PT-BR
      const dataAtual = new Date();
      const dataFormatada = dataAtual.toLocaleDateString('pt-BR') + ' às ' + dataAtual.toLocaleTimeString('pt-BR', {hour: '2-digit', minute:'2-digit'});

      const novoMembro = {
        id: document.getElementById("id-membro").value,
        nome: document.getElementById("nome-membro").value,
        badge: document.getElementById("badge-membro").value || "-",
        patente: document.getElementById("patente-membro").value,
        unidade: document.getElementById("unidade-membro").value,
        ultimaPromocao: dataFormatada // Já entra com a data de ingresso salva
      };

      let lista = JSON.parse(localStorage.getItem("efetivoMembros")) || [];
      lista.push(novoMembro);
      localStorage.setItem("efetivoMembros", JSON.stringify(lista));

      // Exibe mensagem de sucesso e limpa os campos
      const msg = document.getElementById("msg-sucesso");
      msg.style.display = "block";
      document.getElementById("form-cadastro").reset();

      setTimeout(() => { msg.style.display = "none"; }, 3000);
    });
  </script>
</body>
</html>
