<!DOCTYPE html>
<html>
<head>
    <base target="_top">
    <meta charset="UTF-8">
    <style>
        body { background: #0b0e14; color: #fff; font-family: 'Segoe UI', sans-serif; display: flex; flex-direction: column; align-items: center; padding-top: 20px; }
        .nav-tabs { display: flex; gap: 10px; margin-bottom: 20px; }
        .tab-btn { background: #1c2434; border: 1px solid #f0a500; color: #f0a500; padding: 10px 20px; cursor: pointer; font-weight: bold; border-radius: 4px; transition: 0.3s; }
        .tab-btn.active { background: #f0a500; color: #000; }
        .box { background: #141923; padding: 25px; border-radius: 8px; border: 1px solid #232b3c; width: 350px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        input, select { width: 100%; padding: 12px; margin: 8px 0; background: #0b0e14; border: 1px solid #232b3c; color: white; border-radius: 4px; box-sizing: border-box; }
        button.action-btn { width: 100%; padding: 12px; background: #f0a500; border: none; font-weight: bold; cursor: pointer; color: black; border-radius: 4px; margin-top: 10px; transition: 0.3s; }
        button.action-btn:hover { background: #d48e00; }
        label { font-size: 0.9em; color: #888; display: block; margin-top: 10px; }
        .info-id { color: #f0a500; font-weight: bold; font-size: 1.1em; margin: 5px 0; }
    </style>
</head>
<body>

    <div class="nav-tabs">
        <button id="btn-cad" class="tab-btn active" onclick="switchTab('cad')">Novo Cadastro</button>
        <button id="btn-gerir" class="tab-btn" onclick="switchTab('gerir')">Gerir Efetivo</button>
    </div>

    <div id="panel-cad" class="box">
        <h3 style="text-align:center; color:#f0a500; margin-top:0;">Cadastrar Novo Oficial</h3>
        
        <label>ID do Oficial:</label>
        <input type="number" id="cID" placeholder="Digite o ID">
        
        <label>Nome do Oficial:</label>
        <input type="text" id="cNome" placeholder="Digite o Nome">

        <label>Badge (Número):</label>
        <input type="number" id="cBadge" placeholder="Digite o Badge (Ex: 400)">
        
        <label>Patente Inicial:</label>
        <select id="cPatente">
            <option>Aspirante Operador</option><option>Tripulante Operacional</option><option>Operador Oficial</option>
            <option>Operador Sênior</option><option>Operador Veterano</option><option>Aspirante a Piloto</option>
            <option>Piloto Estagiário</option><option>Piloto Oficial</option><option>Piloto Sênior</option>
            <option>Piloto Veterano</option><option>Sub-Comando</option><option>Comando</option><option>Alto Comando</option>
        </select>

        <button class="action-btn" onclick="cadastrarNovo()">Cadastrar Oficial</button>
    </div>

    <div id="panel-gerir" class="box" style="display: none;">
        <h3 style="text-align:center; color:#f0a500; margin-top:0;">Gerir Efetivo GSA</h3>
        
        <label>Selecione o Oficial:</label>
        <select id="gListaOficiais" onchange="selecionarOficial()">
            <option value="">Carregando oficiais...</option>
        </select>

        <div style="margin-top: 15px; border-top: 1px solid #232b3c; padding-top: 10px;">
            <span style="font-size: 0.9em; color: #888;">ID do Selecionado:</span>
            <div id="gMostraID" class="info-id">Nenhum</div>
        </div>

        <label>Alterar Badge:</label>
        <input type="number" id="gBadge" placeholder="Badge atual">

        <label>Alterar Patente:</label>
        <select id="gPatente">
            <option>Alto Comando</option><option>Comando</option><option>Sub-Comando</option>
            <option>Piloto Veterano</option><option>Piloto Sênior</option><option>Piloto Oficial</option>
            <option>Piloto Estagiário</option><option>Aspirante a Piloto</option>
            <option>Operador Veterano</option><option>Operador Sênior</option><option>Operador Oficial</option>
            <option>Tripulante Operacional</option><option>Aspirante Operador</option>
        </select>

        <label>Advertências:</label>
        <input type="text" id="gAdvs" placeholder="Ex: ADV1, ADV2">

        <button class="action-btn" onclick="salvar()">Salvar Alterações</button>
        <button class="action-btn" style="background: #ff4d4d; color: white; margin-top: 5px;" onclick="demitir()">Demitir Oficial</button>
    </div>

    <script>
        var cacheOficiais = []; // Guarda os dados localmente para carregar instantaneamente

        function switchTab(tab) {
            if (tab === 'cad') {
                document.getElementById('panel-cad').style.display = 'block';
                document.getElementById('panel-gerir').style.display = 'none';
                document.getElementById('btn-cad').classList.add('active');
                document.getElementById('btn-gerir').classList.remove('active');
            } else {
                document.getElementById('panel-cad').style.display = 'none';
                document.getElementById('panel-gerir').style.display = 'block';
                document.getElementById('btn-cad').classList.remove('active');
                document.getElementById('btn-gerir').classList.add('active');
                carregarOficiais(); // Busca a lista atualizada quando entra na aba
            }
        }

        // Carrega os nomes no menu Select
        function carregarOficiais() {
            var select = document.getElementById('gListaOficiais');
            select.innerHTML = '<option value="">Carregando lista...</option>';
            
            google.script.run
                .withSuccessHandler(function(lista) {
                    cacheOficiais = lista;
                    select.innerHTML = '<option value="">-- Selecione um Oficial --</option>';
                    lista.forEach(function(oficial) {
                        var opt = document.createElement('option');
                        opt.value = oficial.id;
                        opt.innerText = oficial.nome;
                        select.appendChild(opt);
                    });
                })
                .withFailureHandler(function(err) {
                    select.innerHTML = '<option value="">Erro ao carregar</option>';
                })
                .obterListaOficiais();
        }

        // Quando escolhe o nome, preenche automaticamente os campos na tela
        function selecionarOficial() {
            var idSelecionado = document.getElementById('gListaOficiais').value;
            if (!idSelecionado) {
                document.getElementById('gMostraID').innerText = "Nenhum";
                document.getElementById('gBadge').value = "";
                document.getElementById('gAdvs').value = "";
                return;
            }

            var oficial = cacheOficiais.find(function(item) { return item.id === idSelecionado; });
            if (oficial) {
                document.getElementById('gMostraID').innerText = oficial.id;
                document.getElementById('gBadge').value = oficial.badge;
                document.getElementById('gPatente').value = oficial.patente;
                document.getElementById('gAdvs').value = oficial.advs;
            }
        }

        function cadastrarNovo() {
            var id = document.getElementById('cID').value;
            var nome = document.getElementById('cNome').value;
            var badge = document.getElementById('cBadge').value;
            var pat = document.getElementById('cPatente').value;

            if (!id || !nome || !badge) { alert("Preencha ID, Nome e Badge para cadastrar!"); return; }

            google.script.run
                .withSuccessHandler(function(msg) {
                    alert(msg);
                    document.getElementById('cID').value = '';
                    document.getElementById('cNome').value = '';
                    document.getElementById('cBadge').value = '';
                })
                .withFailureHandler(function(err) { alert("Erro: " + err.message); })
                .inserirNovoOficial(id, nome, badge, pat);
        }

        function salvar() {
            var id = document.getElementById('gMostraID').innerText;
            var badge = document.getElementById('gBadge').value;
            var pat = document.getElementById('gPatente').value;
            var advs = document.getElementById('gAdvs').value;

            if (id === "Nenhum" || !id) { alert("Selecione um oficial na lista primeiro!"); return; }

            google.script.run
                .withSuccessHandler(function(msg) { 
                    alert(msg); 
                    carregarOficiais(); // Atualiza a lista
                })
                .withFailureHandler(function(err) { alert("Erro: " + err.message); })
                .salvarAlteracao(id, badge, pat, advs);
        }

        function demitir() {
            var id = document.getElementById('gMostraID').innerText;
            if (id === "Nenhum" || !id) { alert("Selecione um oficial para demitir!"); return; }
            
            if (confirm("Tem certeza que deseja DEMITIR este oficial?")) {
                google.script.run
                    .withSuccessHandler(function(msg) {
                        alert(msg);
                        document.getElementById('gMostraID').innerText = 'Nenhum';
                        document.getElementById('gBadge').value = '';
                        document.getElementById('gAdvs').value = '';
                        carregarOficiais(); // Recarrega a lista sem o demitido
                    })
                    .withFailureHandler(function(err) { alert("Erro: " + err.message); })
                    .demitirOficial(id);
            }
        }
    </script>
</body>
</html>
