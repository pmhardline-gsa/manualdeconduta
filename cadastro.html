<!DOCTYPE html>
<html lang="pt-BR">
<body style="background-color: #0f131a; color: white; font-family: sans-serif; display: flex; justify-content: center; padding-top: 50px;">

  <form id="meuForm" style="background: #141923; padding: 25px; border-radius: 8px; border: 1px solid #232b3c; width: 320px; display: flex; flex-direction: column; gap: 15px;">
    <h2 style="color: #f0a500; text-align: center;">Novo Cadastro</h2>
    
    <input type="number" name="ID" placeholder="ID" required style="padding: 12px; background: #1c2434; border: 1px solid #232b3c; color: white;">
    <input type="text" name="Nome" placeholder="Nome" required style="padding: 12px; background: #1c2434; border: 1px solid #232b3c; color: white;">
    <input type="number" name="Badge" placeholder="Badge" required style="padding: 12px; background: #1c2434; border: 1px solid #232b3c; color: white;">
    <input type="text" name="Unidade" value="GSA" readonly style="padding: 12px; background: #1c2434; border: 1px solid #232b3c; color: #888;">
    
    <select name="Patente" required style="padding: 12px; background: #1c2434; border: 1px solid #232b3c; color: white;">
        <option value="" disabled selected>Selecione a Patente</option>
        <option value="CMD.GERAL">CMD.GERAL</option>
        <option value="CAPITAO">CAPITAO</option>
    </select>
    
    <button type="submit" id="btn" style="padding: 12px; background: #f0a500; border: none; font-weight: bold; cursor: pointer;">Cadastrar Oficial</button>
    <div id="msg" style="text-align: center; margin-top: 15px; font-weight: bold;"></div>
  </form>

  <script>
    document.getElementById('meuForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const msg = document.getElementById('msg');
      const btn = document.getElementById('btn');
      
      msg.textContent = "Enviando e verificando...";
      btn.disabled = true;

      const formData = new FormData(e.target);
      await fetch('https://api.sheetmonkey.io/form/uNobqNddXgQBDmBA4hVzMF', { method: 'POST', body: formData });

      // Aguarda 4 segundos para o script da planilha rodar e atualizar o status
      setTimeout(() => {
        // NOTA: Para ler o status, você precisaria publicar a aba "Log" como JSON, 
        // mas por segurança e simplicidade, vamos apenas confirmar o envio:
        msg.textContent = "Cadastro enviado! Se os dados forem válidos, serão salvos.";
        msg.style.color = "#f0a500";
        btn.disabled = false;
        e.target.reset();
      }, 4000);
    });
  </script>
</body>
</html>
