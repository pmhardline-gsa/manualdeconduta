<!DOCTYPE html>
<html lang="pt-BR">
<body style="background-color: #0f131a; color: white; font-family: sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0;">

  <form id="meuForm" style="background: #141923; padding: 25px; border-radius: 8px; border: 1px solid #232b3c; width: 350px; display: flex; flex-direction: column; gap: 15px;">
    <h2 style="color: #f0a500; text-align: center; margin: 0;">Novo Cadastro</h2>
    
    <input type="number" id="id" name="ID" placeholder="ID" required style="padding: 12px; background: #1c2434; border: 1px solid #232b3c; color: white;">
    <input type="text" name="Nome" placeholder="Nome" required style="padding: 12px; background: #1c2434; border: 1px solid #232b3c; color: white;">
    <input type="number" id="badge" name="Badge" placeholder="Badge" required style="padding: 12px; background: #1c2434; border: 1px solid #232b3c; color: white;">
    
    <select name="Patente" required style="padding: 12px; background: #1c2434; border: 1px solid #232b3c; color: white;">
        <option value="CMD.GERAL">CMD.GERAL</option>
        <option value="CAPITAO">CAPITAO</option>
    </select>
    
    <input type="password" id="senha" placeholder="Senha de acesso" required style="padding: 12px; background: #1c2434; border: 1px solid #232b3c; color: white;">
    
    <button type="submit" id="btn" style="padding: 12px; background: #f0a500; border: none; font-weight: bold; cursor: pointer; color: black;">Cadastrar Oficial</button>
    
    <a href="SUA_URL_AQUI" target="_blank" style="text-align: center; color: #777; font-size: 13px;">Voltar para a Planilha</a>
    
    <div id="msg" style="text-align: center; font-weight: bold; margin-top: 10px;"></div>
  </form>

  <script>
    document.getElementById('meuForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const msg = document.getElementById('msg');
      const senhaCorreta = "123"; // Mude sua senha aqui
      
      // 1. Validação de Senha
      if (document.getElementById('senha').value !== senhaCorreta) {
        msg.textContent = "❌ Senha incorreta!";
        msg.style.color = "#ff4d4d";
        return;
      }

      // 2. Validação visual simples (Aviso)
      msg.textContent = "✅ Enviando... Se os dados forem duplicados, o sistema removerá em breve.";
      msg.style.color = "#f0a500";
      
      const formData = new FormData(e.target);
      await fetch('https://api.sheetmonkey.io/form/uNobqNddXgQBDmBA4hVzMF', { method: 'POST', body: formData });

      e.target.reset();
    });
  </script>
</body>
</html>
