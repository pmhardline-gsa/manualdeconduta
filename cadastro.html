<!DOCTYPE html>
<html>
<head>
    <style>
        body { background: #0b0e14; color: #fff; font-family: 'Segoe UI', sans-serif; display: flex; flex-direction: column; align-items: center; }
        .tab-btn { background: #1c2434; border: 1px solid #f0a500; color: #f0a500; padding: 10px 20px; cursor: pointer; border-radius: 4px; }
        .tab-btn:hover { background: #f0a500; color: #000; }
        .box { background: #141923; padding: 25px; border-radius: 8px; border: 1px solid #232b3c; width: 350px; margin-top: 20px; }
        input, select { width: 100%; padding: 12px; margin: 8px 0; background: #0b0e14; border: 1px solid #232b3c; color: white; border-radius: 4px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background: #f0a500; border: none; font-weight: bold; cursor: pointer; color: black; border-radius: 4px; }
        .checkbox-group { display: flex; justify-content: space-between; padding: 10px; background: #0b0e14; border-radius: 4px; margin: 10px 0; font-size: 14px; }
    </style>
</head>
<body>

    <div style="margin-top:20px;">
        <button class="tab-btn" onclick="show('cad')">Novo Cadastro</button>
        <button class="tab-btn" onclick="show('gerir')">Gerir Efetivo</button>
    </div>

    <div id="cad" class="box">
        <h3 style="color:#f0a500; text-align:center;">Cadastrar Oficial</h3>
        <input type="number" id="cID" placeholder="ID">
        <input type="text" id="cNome" placeholder="Nome">
        <button onclick="alert('Use seu link SheetMonkey no formulário HTML')">Cadastrar</button>
    </div>

    <div id="gerir" class="box" style="display:none;">
        <h3 style="color:#f0a500; text-align:center;">Gerir Efetivo</h3>
        <input type="number" id="gID" placeholder="Digite o ID do Oficial" onblur="buscar()">
        <div id="gNome" style="color:#f0a500; font-weight:bold; margin-bottom:10px; text-align:center;"></div>
        
        <label>Nova Patente:</label>
        <select id="gPatente">
            <option>Alto Comando</option><option>Comando</option><option>Sub-Comando</option>
            <option>Piloto Veterano</option><option>Piloto Sênior</option><option>Piloto Oficial</option>
            <option>Piloto Estagiário</option><option>Aspirante a Piloto</option>
            <option>Operador Veterano</option><option>Operador Sênior</option><option>Operador Oficial</option>
            <option>Tripulante Operacional</option><option>Aspirante Operador</option>
        </select>
        
        <div class="checkbox-group">
            <label><input type="checkbox" id="adv1"> ADV 1</label>
            <label><input type="checkbox" id="adv2"> ADV 2</label>
            <label><input type="checkbox" id="adv3"> ADV 3</label>
        </div>
        <button onclick="salvar()">Salvar Alterações</button>
    </div>

    <script>
        function show(id) {
            document.getElementById('cad').style.display = id == 'cad' ? 'block' : 'none';
            document.getElementById('gerir').style.display = id == 'gerir' ? 'block' : 'none';
        }
        function buscar() {
            const id = document.getElementById('gID').value;
            google.script.run.withSuccessHandler(nome => {
                document.getElementById('gNome').innerText = "Oficial: " + nome;
            }).buscarNomePorId(id);
        }
        function salvar() {
            const id = document.getElementById('gID').value;
            const pat = document.getElementById('gPatente').value;
            const a1 = document.getElementById('adv1').checked;
            const a2 = document.getElementById('adv2').checked;
            const a3 = document.getElementById('adv3').checked;
            google.script.run.withSuccessHandler(msg => alert(msg)).salvarAlteracao(id, pat, a1, a2, a3);
        }
    </script>
</body>
</html>
