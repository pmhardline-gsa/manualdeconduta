<!DOCTYPE html>
<html lang="pt-BR">
<head>
<style>
    body { background-color: #0b0e14; color: white; font-family: sans-serif; }
    .tabs { display: flex; gap: 10px; margin-bottom: 20px; justify-content: center; }
    button { padding: 10px 20px; cursor: pointer; background: #1c2434; border: 1px solid #f0a500; color: white; }
    button:hover { background: #f0a500; color: black; }
    .content { display: none; max-width: 400px; margin: auto; background: #141923; padding: 20px; border-radius: 8px; }
    .active { display: block; }
</style>
</head>
<body>

<div class="tabs">
    <button onclick="openTab('cadastrar')">Novo Cadastro</button>
    <button onclick="openTab('gerir')">Gerir Efetivo</button>
</div>

<div id="cadastrar" class="content active">
    <h2>Cadastrar Novo Oficial</h2>
    <form id="formCadastro">
        <input type="number" name="ID" placeholder="ID" required style="width: 100%; margin-bottom: 10px;">
        <input type="text" name="Nome" placeholder="Nome" required style="width: 100%; margin-bottom: 10px;">
        <select name="Unidade" required style="width: 100%; margin-bottom: 10px;">
            <option value="GSA">GSA</option><option value="RPM">RPM</option>
            <option value="SWAT">SWAT</option><option value="SPEED">SPEED</option>
        </select>
        <button type="submit">Cadastrar</button>
    </form>
</div>

<div id="gerir" class="content">
    <h2>Gerir Efetivo</h2>
    <input type="number" id="idBusca" placeholder="Digite o ID do Oficial" style="width: 100%; margin-bottom: 10px;">
    
    <div style="margin-top: 10px;">
        <label>Patente:</label>
        <select id="novaPatente" style="width: 100%;">
            <option value="Alto Comando">Alto Comando</option>
            <option value="Comando">Comando</option>
            <option value="Sub-Comando">Sub-Comando</option>
        </select>
    </div>

    <div style="margin-top: 10px;">
        <label>Advertências:</label><br>
        <input type="checkbox" value="ADV1"> ADV 1 
        <input type="checkbox" value="ADV2"> ADV 2
    </div>

    <button onclick="salvarGestao()" style="margin-top: 15px; width: 100%;">Salvar Alterações</button>
</div>

<script>
function openTab(tabName) {
    document.querySelectorAll('.content').forEach(c => c.style.display = 'none');
    document.getElementById(tabName).style.display = 'block';
}

function salvarGestao() {
    alert("Dados enviados para atualização da planilha!");
    // Aqui você integraria com um script que busca o ID na planilha e atualiza as colunas
}
</script>

</body>
</html>
