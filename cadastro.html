<form id="cadastroForm">
    <!-- Remova o action e method do form original -->
    <input type="number" id="id" name="ID" placeholder="ID" required>
    <input type="text" id="nome" name="Nome" placeholder="Nome" required>
    <input type="number" id="badge" name="Badge" placeholder="Badge" required>
    <select name="Patente" required>
        <option value="CMD.GERAL">CMD.GERAL</option>
        <option value="CAPITAO">CAPITAO</option>
    </select>
    <button type="submit" id="btnEnviar">Cadastrar Oficial</button>
</form>

<div id="statusMsg"></div>

<script>
  document.getElementById('cadastroForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const btn = document.getElementById('btnEnviar');
    const msg = document.getElementById('statusMsg');
    
    btn.disabled = true;
    msg.textContent = "Processando...";

    const formData = new FormData(e.target);
    
    // Envia para o SheetMonkey
    const response = await fetch('https://api.sheetmonkey.io/form/uNobqNddXgQBDmBA4hVzMF', {
      method: 'POST',
      body: formData
    });

    if (response.ok) {
      msg.textContent = "Cadastro enviado com sucesso!";
      // Opcional: Redirecionar após sucesso
      // window.location.href = '...';
    } else {
      msg.textContent = "Erro no envio.";
    }
  });
</script>
