<!DOCTYPE html>
<html lang="pt-BR">
<body style="background-color: #0f131a; color: white; font-family: sans-serif; display: flex; justify-content: center; padding-top: 50px;">

  <form id="meuForm" style="background: #141923; padding: 25px; border-radius: 8px; border: 1px solid #232b3c; width: 320px; display: flex; flex-direction: column; gap: 15px;">
    <h2 style="color: #f0a500; text-align: center;">Novo Cadastro</h2>
    
    <input type="number" name="ID" placeholder="ID" required style="padding: 12px; background: #1c2434; border: 1px solid #232b3c; color: white;">
    <input type="text" name="Nome" placeholder="Nome" required style="padding: 12px; background: #1c2434; border: 1px solid #232b3c; color: white;">
    <input type="number" name="Badge" placeholder="Badge" required style="padding: 12px; background: #1c2434; border: 1px solid #232b3c; color: white;">
    
    <input type="password" id="senha" placeholder="Digite a senha de acesso" required style="padding: 12px; background: #1c2434; border: 1px solid #232b3c; color: white;">
    
    <button type="submit" id="btn" style="padding: 12px; background: #f0a500; border: none; font-weight: bold; cursor: pointer;">Cadastrar Oficial</button>
    
    <a href="LINK_DA_SUA_PLANILHA_AQUI" target="_blank" style="text-align: center; color: #555; text-decoration: none; font-size: 14px; margin-top: 10px;">Voltar para a Planilha</a>
    
    <div id="msg" style="text-align: center; margin-top: 10px; font-weight: bold;"></div>
  </form>

  <script>
    document.getElementById('meuForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const senhaCorreta = "123456"; // <--- ALTERE A SENHA AQUI
      const senhaDigitada = document.getElementById('senha').value;
      const msg = document.getElementById('msg');

      if (senhaDigitada !== senhaCorreta) {
        msg.textContent = "Senha incorreta!";
        msg.style.color = "#ff4d4d";
        return;
      }

      msg.textContent = "Cadastrando...";
      const formData = new FormData(e.target);
      
      await fetch('https://api.sheetmonkey.io/form/uNobqNddXgQBDmBA4hVzMF', {
        method: 'POST',
        body: formData
      });

      msg.textContent = "Cadastro concluído com sucesso!";
      msg.style.color = "#4CAF50";
      e.target.reset();
    });
  </script>
</body>
</html>
