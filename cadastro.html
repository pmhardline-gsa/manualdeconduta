<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Cadastro de Oficial - GSA</title>
  <style>
    body { background-color: #0f131a; color: white; font-family: sans-serif; display: flex; justify-content: center; padding-top: 50px; }
    form { background: #141923; padding: 25px; border-radius: 8px; width: 350px; border: 1px solid #232b3c; }
    input { width: 100%; padding: 10px; margin: 8px 0; background: #1c2434; border: 1px solid #232b3c; color: white; box-sizing: border-box; }
    button { width: 100%; padding: 12px; background: #f0a500; border: none; font-weight: bold; cursor: pointer; color: black; margin-top: 10px; }
  </style>
</head>
<body>

  <form action="https://api.sheetmonkey.io/form/uNobqNddXgQBDmBA4hVzMF" method="POST">
    <h2 style="color: #f0a500; text-align: center;">Novo Cadastro</h2>
    
    <!-- Os nomes (name) abaixo precisam ser idênticos aos cabeçalhos da sua planilha -->
    <input type="text" name="ID" placeholder="ID" required>
    <input type="text" name="Nome" placeholder="Nome do Policial" required>
    <input type="text" name="Badge" placeholder="Número da Badge" required>
    <input type="text" name="Patente" placeholder="Patente" required>
    <input type="text" name="Unidade" placeholder="Unidade" value="GSA" required>
    
    <button type="submit">Cadastrar Oficial</button>
  </form>

</body>
</html>
