<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Efetivo PMHL-GSA - Centralizado</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.0/papaparse.min.js"></script>
  <style>
    body { background-color: #0f131a; color: #ffffff; font-family: sans-serif; padding: 20px; }
    h1 { color: #f0a500; text-align: center; border-bottom: 2px solid #232b3c; padding-bottom: 10px; }
    table { width: 100%; border-collapse: collapse; background-color: #141923; margin-top: 20px; }
    th { background-color: #1c2434; color: #f0a500; padding: 15px; border: 1px solid #232b3c; }
    td { border: 1px solid #232b3c; padding: 12px; text-align: center; color: #e2e8f0; }
    .btn-link { color: #f0a500; text-decoration: none; font-weight: bold; transition: 0.3s; }
    .btn-link:hover { color: #d48e00; text-decoration: underline; }
  </style>
</head>
<body>

  <h1>Cadeia de Comando - PMHL-GSA</h1>
  
  <div style="text-align: center;">
    <a href="https://script.google.com/macros/s/AKfycbwTBNEa6xuLrEDMrIcDcNnNmtJGK_rgfwNmrBsdz58kwhoqgCiBrxSBjkpxf4slHAO8/exec" target="_blank" class="btn-link">+ Novo Cadastro</a>
  </div>

  <table id="tabela-efetivo">
    <thead>
      <tr>
        <th>ID</th>
        <th>Nome</th>
        <th>Badge</th>
        <th>Patente</th>
        <th>Unidade</th>
        <th>Advertências</th>
        <th>Cursos</th>
      </tr>
    </thead>
    <tbody id="corpo-tabela">
      <tr><td colspan="7">Carregando dados...</td></tr>
    </tbody>
  </table>

  <script>
    const URL_PLANILHA = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSw-LdIv-3xH3eswHp06gAaxJI8e9aJcrfyuBPPhBIyc6lwHww33rXMhYei5JzTfDxAc96w2kBZ2DWb/pub?output=csv";

    function carregarDados() {
      Papa.parse(URL_PLANILHA, {
        download: true,
        header: true,
        complete: function(results) {
          const corpo = document.getElementById("corpo-tabela");
          corpo.innerHTML = "";
          
          results.data.forEach(membro => {
            if (membro.Nome && membro.Nome.trim() !== "") {
              // Pega as colunas de Advertências e Cursos exatamente como estão na planilha
              const advs = membro["Advertências"] || "";
              const cursos = membro["Cursos"] || "";
              
              corpo.innerHTML += `
                <tr>
                  <td>${membro.ID}</td>
                  <td>${membro.Nome}</td>
                  <td>${membro.Badge}</td>
                  <td>${membro.Patente}</td>
                  <td>${membro.Unidade}</td>
                  <td>${advs}</td>
                  <td>${cursos}</td>
                </tr>`;
            }
          });
          
          if(corpo.innerHTML === "") {
            corpo.innerHTML = `<tr><td colspan="7">Nenhum registro encontrado.</td></tr>`;
          }
        }
      });
    }
    carregarDados();
    setInterval(carregarDados, 60000); 
  </script>
</body>
</html>
