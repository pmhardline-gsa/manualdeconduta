<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Efetivo - 1º BPM HARDLINE</title>
  <style>
    body {
      background-color: #0f131a;
      color: #ffffff;
      font-family: sans-serif;
      margin: 20px;
    }
    .btn-cadastro {
      background-color: #f0a500;
      color: #000000;
      padding: 10px 20px;
      text-decoration: none;
      font-weight: bold;
      border-radius: 4px;
      display: inline-block;
      margin-bottom: 20px;
    }
    .btn-cadastro:hover {
      background-color: #b8860b;
    }
    .btn-excluir {
      background: #ff4d4d;
      color: white;
      border: none;
      padding: 3px 7px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 11px;
      font-weight: bold;
      margin-left: 10px;
      transition: background 0.2s;
    }
    .btn-excluir:hover {
      background: #cc3333;
    }
    .nome-container {
      display: flex;
      justify-content: space-between;
      align-items: center;
      width: 100%;
    }
  </style>
</head>
<body>

  <a href="cadastro.html" class="btn-cadastro">+ Cadastrar Novo Membro</a>

  <table style="width:100% !important; border-collapse:collapse !important; background-color:#141923 !important; color:#ffffff !important; font-size:13px !important; border: 1px solid #232b3c !important;">
    <thead>
      <tr style="background-color:#1c2434 !important;">
        <th colspan="12" style="padding:15px !important; text-align:center !important; color:#f0a500 !important; font-size:22px !important; font-weight:bold !important; letter-spacing:2px !important; border-bottom:2px solid #232b3c !important; background-color:#1c2434 !important;">
          1º BPM - HARDLINE
        </th>
      </tr>
      <tr style="background-color:#1a2232 !important; text-align:center !important; font-weight:bold !important; color:#f0a500 !important; border-bottom:1px solid #232b3c !important;">
        <th rowspan="2" style="padding:10px !important; border:1px solid #232b3c !important; width:5% !important; background-color:#1a2232 !important;">ID</th>
        <th rowspan="2" style="padding:10px !important; border:1px solid #232b3c !important; width:25% !important; text-align:left !important; background-color:#1a2232 !important;">NOME</th>
        <th rowspan="2" style="padding:10px !important; border:1px solid #232b3c !important; width:8% !important; background-color:#1a2232 !important;">BADGE</th>
        <th rowspan="2" style="padding:10px !important; border:1px solid #232b3c !important; width:18% !important; background-color:#1a2232 !important;">PATENTE</th>
        <th rowspan="2" style="padding:10px !important; border:1px solid #232b3c !important; width:14% !important; background-color:#1a2232 !important;">UNIDADE</th>
        <th colspan="4" style="padding:5px !important; border:1px solid #232b3c !important; background-color:#b8860b !important; color:#000000 !important;">CURSOS</th>
        <th colspan="3" style="padding:5px !important; border:1px solid #232b3c !important; color:#ff4d4d !important; background-color:#1a2232 !important;">ADVERTÊNCIAS</th>
      </tr>
      <tr style="background-color:#242f44 !important; text-align:center !important; font-size:11px !important; color:#ffffff !important;">
        <th style="padding:5px !important; border:1px solid #232b3c !important; background-color:#d4af37 !important; color:#000000 !important; width:4% !important;">AB</th>
        <th style="padding:5px !important; border:1px solid #232b3c !important; background-color:#d4af37 !important; color:#000000 !important; width:4% !important;">AC</th>
        <th style="padding:5px !important; border:1px solid #232b3c !important; background-color:#d4af37 !important; color:#000000 !important; width:4% !important;">CO</th>
        <th style="padding:5px !important; border:1px solid #232b3c !important; background-color:#d4af37 !important; color:#000000 !important; width:4% !important;">TB</th>
        <th style="padding:5px !important; border:1px solid #232b3c !important; color:#ff4d4d !important; background-color:#242f44 !important; width:4% !important;">ADV 1</th>
        <th style="padding:5px !important; border:1px solid #232b3c !important; color:#ff4d4d !important; background-color:#242f44 !important; width:4% !important;">ADV 2</th>
        <th style="padding:5px !important; border:1px solid #232b3c !important; color:#ff4d4d !important; background-color:#242f44 !important; width:4% !important;">ADV 3</th>
      </tr>
    </thead>
    
    <tbody id="corpo-da-tabela">
      <tr id="secao-alto-comando" style="background-color:#2a364f !important; font-weight:bold !important; color:#ffffff !important; text-align:center !important;">
        <td colspan="12" style="padding:6px !important; letter-spacing:1px !important; border:1px solid #232b3c !important;">ALTO COMANDO</td>
      </tr>

      <tr id="secao-comandos-unidade" style="background-color:#2a364f !important; font-weight:bold !important; color:#ffffff !important; text-align:center !important;">
        <td colspan="12" style="padding:6px !important; letter-spacing:1px !important; border:1px solid #232b3c !important;">COMANDOS DE UNIDADE</td>
      </tr>

      <tr id="secao-sargentos" style="background-color:#2a364f !important; font-weight:bold !important; color:#ffffff !important; text-align:center !important;">
        <td colspan="12" style="padding:6px !important; letter-spacing:1px !important; border:1px solid #232b3c !important;">SARGENTO / PRAÇAS</td>
      </tr>
    </tbody>
  </table>

  <script>
    document.addEventListener("DOMContentLoaded", function () {
      const SENHA_COMANDO = "COMANDO1BPM"; 

      function renderizarMembros() {
        // Limpa as linhas geradas anteriormente para não duplicar
        const linhasAntigas = document.querySelectorAll(".linha-dinamica");
        linhasAntigas.forEach(linha => linha.remove());

        const membrosSalvos = JSON.parse(localStorage.getItem("efetivoMembros")) || [];
        // Inverte a ordem para listar os mais recentes primeiro de forma correta
        const membrosInvertidos = [...membrosSalvos].reverse();

        const coresUnidades = {
          'RPM': '#1a4a75', 'SPEED': '#236b43', 'GTM': '#4a354f', 
          'GRA': '#5c3a21', 'SWAT': '#2d3748', 'CMD SPEED': '#1b4d3e', 
          'CMD GTM': '#4a354f', 'CMD GRA': '#5c3a21', 'CMD SWAT': '#2d3748'
        };

        membrosInvertidos.forEach((membro, index) => {
          const realIndex = membrosSalvos.length - 1 - index;
          const corUnidade = coresUnidades[membro.unidade.toUpperCase()] || '#4a5568';

          const novaLinhaHTML = `
            <tr class="linha-dinamica" style="text-align:center !important; background-color:#141923 !important;">
              <td style="padding:8px !important; border:1px solid #232b3c !important; color:#718096 !important; background-color:#141923 !important;">${membro.id}</td>
              <td style="padding:8px !important; border:1px solid #232b3c !important; text-align:left !important; font-weight:bold !important; background-color:#141923 !important;">
                <div class="nome-container">
                  <span>${membro.nome}</span>
                  <button class="btn-excluir" onclick="excluirMembro(${realIndex})">X</button>
                </div>
              </td>
              <td style="padding:8px !important; border:1px solid #232b3c !important; color:#a0aec0 !important; background-color:#141923 !important;">${membro.badge || '-'}</td>
              <td style="padding:8px !important; border:1px solid #232b3c !important; background-color:#141923 !important;">${membro.patente}</td>
              <td style="padding:8px !important; border:1px solid #232b3c !important; background-color:${corUnidade} !important; color:#ffffff !important; font-weight:bold !important;">${membro.unidade.toUpperCase()}</td>
              <td style="border:1px solid #232b3c !important; color:#4a5568 !important; background-color:#141923 !important;">☐</td>
              <td style="border:1px solid #232b3c !important; color:#4a5568 !important; background-color:#141923 !important;">☐</td>
              <td style="border:1px solid #232b3c !important; color:#4a5568 !important; background-color:#141923 !important;">☐</td>
              <td style="border:1px solid #232b3c !important; color:#4a5568 !important; background-color:#141923 !important;">☐</td>
              <td style="border:1px solid #232b3c !important; color:#4a5568 !important; background-color:#141923 !important;">☐</td>
              <td style="border:1px solid #232b3c !important; color:#4a5568 !important; background-color:#141923 !important;">☐</td>
              <td style="border:1px solid #232b3c !important; color:#4a5568 !important; background-color:#141923 !important;">☐</td>
            </tr>
          `;

          let secaoAlvo;
          const patenteLimpa = membro.patente.toLowerCase();

          if (patenteLimpa.includes("geral") || patenteLimpa.includes("tenente") || patenteLimpa.includes("sub-tenente")) {
            secaoAlvo = document.getElementById("secao-alto-comando");
          } else if (patenteLimpa.includes("cmd") || patenteLimpa.includes("comando")) {
            secaoAlvo = document.getElementById("secao-comandos-unidade");
          } else {
            secaoAlvo = document.getElementById("secao-sargentos");
          }

          // Segurança extra: se encontrar a seção ele coloca embaixo dela, se não encontrar, joga no fim da tabela
          if (secaoAlvo) {
            secaoAlvo.insertAdjacentHTML('afterend', novaLinhaHTML);
          } else {
            document.getElementById("corpo-da-tabela").insertAdjacentHTML('beforeend', novaLinhaHTML);
          }
        });
      }

      window.excluirMembro = function(index) {
        const senhaDigitada = prompt("Digite a senha de Comando para confirmar a demissão:");

        if (senhaDigitada === SENHA_COMANDO) {
          if (confirm("Tem certeza absoluta que deseja remover este policial do efetivo?")) {
            let membrosExistentes = JSON.parse(localStorage.getItem("efetivoMembros")) || [];
            membrosExistentes.splice(index, 1);
