<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <style>
    body { margin: 0; padding: 0; background-color: #111417; }
    iframe { width: 100%; height: 100vh; border: none; }
  </style>
</head>
<body>
  <iframe srcdoc='
    <!DOCTYPE html>
    <html lang="pt-BR">
    <head>
      <style>
        body { background-color: #141923; color: #ffffff; font-family: sans-serif; padding: 15px; }
        table { width: 100%; border-collapse: collapse; text-align: center; border: 1px solid #232b3c; table-layout: fixed; }
        th, td { padding: 10px; border: 1px solid #232b3c; overflow: hidden; }
        thead tr { background-color: #1c2434; color: #f0a500; }
        .col-fixa { width: 80px; } /* Largura fixa para colunas de checkboxes */
        .marcado { color: #f0a500; font-weight: bold; }
        .vazio { color: #4a5568; }
      </style>
    </head>
    <body>
      <table>
        <thead>
          <tr>
            <th rowspan="2" style="width: 50px;">ID</th>
            <th rowspan="2">NOME</th>
            <th rowspan="2" style="width: 80px;">BADGE</th>
            <th rowspan="2">PATENTE</th>
            <th rowspan="2">UNIDADE</th>
            <th colspan="3">ADVERTÊNCIAS</th>
            <th colspan="2">CURSOS</th>
          </tr>
          <tr>
            <th class="col-fixa">ADV 1</th><th class="col-fixa">ADV 2</th><th class="col-fixa">ADV 3</th>
            <th class="col-fixa">C.F.A</th><th class="col-fixa">P.O.E</th>
          </tr>
        </thead>
        <tbody id="corpo-tabela"><tr><td colspan="10">Carregando dados...</td></tr></tbody>
      </table>
      <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.0/papaparse.min.js"></script>
      <script>
        const URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSw-LdIv-3xH3eswHp06gAaxJI8e9aJcrfyuBPPhBIyc6lwHww33rXMhYei5JzTfDxAc96w2kBZ2DWb/pub?output=csv";
        Papa.parse(URL, { download: true, header: true, complete: function(res) {
          const corpo = document.getElementById("corpo-tabela");
          corpo.innerHTML = "";
          res.data.filter(m => m.Nome).forEach(m => {
            let adv = (m["Advertências"] || "").toUpperCase();
            let cur = (m["Cursos"] || "").toUpperCase();
            corpo.innerHTML += `<tr>
              <td>${m.ID}</td><td style="text-align:left">${m.Nome}</td><td>${m.Badge || "-"}</td><td>${m.Patente || "-"}</td><td>${m.Unidade || "-"}</td>
              <td>${adv.includes("ADV1") ? "<span class=marcado>☑</span>" : "<span class=vazio>☐</span>"}</td>
              <td>${adv.includes("ADV2") ? "<span class=marcado>☑</span>" : "<span class=vazio>☐</span>"}</td>
              <td>${adv.includes("ADV3") ? "<span class=marcado>☑</span>" : "<span class=vazio>☐</span>"}</td>
              <td>${cur.includes("C.F.A") ? "<span class=marcado>☑</span>" : "<span class=vazio>☐</span>"}</td>
              <td>${cur.includes("P.O.E") ? "<span class=marcado>☑</span>" : "<span class=vazio>☐</span>"}</td>
            </tr>`;
          });
        }});
      </script>
    </body>
    </html>
  '></iframe>
</body>
</html>
