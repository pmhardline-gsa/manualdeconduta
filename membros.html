<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Efetivo PMHL-GSA</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.0/papaparse.min.js"></script>
  <style>
    body { background-color: #0b0e14; color: #ffffff; font-family: 'Segoe UI', sans-serif; padding: 20px; }
    .container { max-width: 1350px; margin: 0 auto; }
    h1 { color: #f0a500; text-align: center; }
    .table-wrapper { background-color: #141923; border: 1px solid #232b3c; border-radius: 8px; overflow: hidden; }
    table { width: 100%; border-collapse: collapse; text-align: center; }
    th, td { padding: 12px; border: 1px solid #232b3c; }
    thead tr { background-color: #1c2434; color: #f0a500; }
    .categoria-divisora { background-color: #1c2434 !important; color: #ffffff !important; font-weight: bold; text-transform: uppercase; }
    .chk-box { font-size: 1.2em; }
    .marcado { color: #f0a500; }
    .adv-marcado { color: #ff4d4d; }
    .vazio { color: #4a5568; }
  </style>
</head>
<body>

  <div class="container">
    <h1>1º BPM - HARDLINE</h1>
    
    <div class="table-wrapper">
      <table id="tabela-efetivo">
        <thead>
          <tr>
            <th rowspan="2">ID</th>
            <th rowspan="2">NOME</th>
            <th rowspan="2">BADGE</th>
            <th rowspan="2">PATENTE</th>
            <th rowspan="2">UNIDADE</th>
            <th colspan="3">ADVERTÊNCIAS</th>
            <th colspan="2">CURSOS</th>
          </tr>
          <tr>
            <th>ADV 1</th><th>ADV 2</th><th>ADV 3</th>
            <th>C.F.A</th><th>P.O.E</th>
          </tr>
        </thead>
        <tbody id="corpo-tabela">
          <tr><td colspan="10">Carregando...</td></tr>
        </tbody>
      </table>
    </div>
  </div>

  <script>
    const URL_PLANILHA = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSw-LdIv-3xH3eswHp06gAaxJI8e9aJcrfyuBPPhBIyc6lwHww33rXMhYei5JzTfDxAc96w2kBZ2DWb/pub?output=csv";
    
    // Simplifiquei a hierarquia para evitar erros de leitura
    const hierarquia = {
      "ALTO COMANDO": 1, "COMANDO": 2, "SUB-COMANDO": 3,
      "PILOTO VETERANO": 4, "PILOTO SÊNIOR": 5, "PILOTO OFICIAL": 6, "PILOTO ESTAGIÁRIO": 7, "ASPIRANTE A PILOTO": 8,
      "OPERADOR VETERANO": 9, "OPERADOR SÊNIOR": 10, "OPERADOR OFICIAL": 11, "TRIPULANTE OPERACIONAL": 12, "ASPIRANTE OPERADOR": 13
    };

    function carregarDados() {
      Papa.parse(URL_PLANILHA, {
        download: true, header: true,
        complete: function(results) {
          const corpo = document.getElementById("corpo-tabela");
          corpo.innerHTML = "";
          
          let membros = results.data.filter(m => m.Nome && m.Nome.trim() !== "");
          membros.sort((a, b) => (hierarquia[a.Patente?.toUpperCase().trim()] || 99) - (hierarquia[b.Patente?.toUpperCase().trim()] || 99));

          let cat = "";
          membros.forEach(m => {
            // Lógica de categorias
            let patente = m.Patente || "";
            let novaCat = patente.includes("PILOTO") ? "PILOTOS" : (patente.includes("OPERADOR") || patente.includes("TRIPULANTE") ? "OPERADORES" : "COMANDO");
            if (cat !== novaCat) {
              cat = novaCat;
              corpo.innerHTML += `<tr><td colspan="10" class="categoria-divisora">${cat}</td></tr>`;
            }

            // Advertências
            let adv = (m["Advertências"] || "").toUpperCase();
            let b1 = adv.includes("ADV1") || adv.includes("ADV2") || adv.includes("ADV3") ? '<span class="marcado">☑</span>' : '<span class="vazio">☐</span>';
            let b2 = adv.includes("ADV2") || adv.includes("ADV3") ? '<span class="marcado">☑</span>' : '<span class="vazio">☐</span>';
            let b3 = adv.includes("ADV3") ? '<span class="marcado">☑</span>' : '<span class="vazio">☐</span>';

            // Cursos
            let cursos = (m["Cursos"] || "").toUpperCase();
            let c1 = cursos.includes("C.F.A") ? '<span class="marcado">☑</span>' : '<span class="vazio">☐</span>';
            let c2 = cursos.includes("P.O.E") ? '<span class="marcado">☑</span>' : '<span class="vazio">☐</span>';

            corpo.innerHTML += `<tr>
              <td>${m.ID}</td><td style="text-align:left">${m.Nome}</td><td>${m.Badge || "-"}</td>
              <td>${m.Patente || "-"}</td><td>${m.Unidade || "-"}</td>
              <td>${b1}</td><td>${b2}</td><td>${b3}</td><td>${c1}</td><td>${c2}</td>
            </tr>`;
          });
        }
      });
    }
    carregarDados();
  </script>
</body>
</html>
