<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Efetivo PMHL - GSA</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.0/papaparse.min.js"></script>
  <style>
    body { background-color: #0b0e14; color: #ffffff; font-family: 'Segoe UI', sans-serif; padding: 20px; }
    .table-wrapper { background-color: #141923; border-radius: 12px; overflow: hidden; border: 1px solid #232b3c; }
    table { width: 100%; border-collapse: collapse; }
    th { background-color: #1c2434; color: #f0a500; padding: 15px; text-transform: uppercase; font-size: 0.8em; }
    td { padding: 15px; border-bottom: 1px solid #1a202c; text-align: center; }
    .categoria-divisora { background-color: #1c2434 !important; font-weight: bold; padding: 10px !important; }
  </style>
</head>
<body>

  <div class="table-wrapper">
    <table id="tabela-efetivo">
      <thead>
        <tr>
          <th>ID</th><th>NOME</th><th>BADGE</th><th>PATENTE</th><th>UNIDADE</th><th>ADV</th><th>CFA</th><th>POE</th>
        </tr>
      </thead>
      <tbody id="corpo-tabela">
        <tr><td colspan="8">Aguardando conexão com a planilha...</td></tr>
      </tbody>
    </table>
  </div>

  <script>
    // URL direta de publicação (CSV)
    const URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSw-LdIv-3xH3eswHp06gAaxJI8e9aJcrfyuBPPhBIyc6lwHww33rXMhYei5JzTfDxAc96w2kBZ2DWb/pub?output=csv";

    function carregar() {
      Papa.parse(URL, {
        download: true,
        header: true,
        error: function(err) {
          document.getElementById("corpo-tabela").innerHTML = "<tr><td colspan='8'>Erro ao carregar dados. Verifique a URL.</td></tr>";
        },
        complete: function(results) {
          const corpo = document.getElementById("corpo-tabela");
          corpo.innerHTML = "";
          
          if (results.data.length === 0) {
            corpo.innerHTML = "<tr><td colspan='8'>Nenhum dado encontrado.</td></tr>";
            return;
          }

          results.data.forEach(m => {
            if (m.Nome && m.Nome.trim() !== "") {
              let cursos = (m.Cursos || "").toUpperCase();
              corpo.innerHTML += `<tr>
                <td>${m.ID || "-"}</td>
                <td style="text-align:left">${m.Nome}</td>
                <td>${m.Badge || "-"}</td>
                <td>${m.Patente || "-"}</td>
                <td>${m.Unidade || "-"}</td>
                <td>${m.Advertências || "-"}</td>
                <td>${cursos.includes("C.F.A") ? "☑" : "☐"}</td>
                <td>${cursos.includes("P.O.E") ? "☑" : "☐"}</td>
              </tr>`;
            }
          });
        }
      });
    }

    // Executa a função assim que a página carregar
    window.onload = carregar;
  </script>
</body>
</html>
