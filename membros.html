<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Membros</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    <style>
        body { background-color: #0f131a; color: #e2e8f0; font-family: sans-serif; padding: 20px; }
        .tabela-membros { width: 100%; border-collapse: collapse; border: 1px solid #232b3c; }
        .tabela-membros th { background: #1c2434; color: #f0a500; padding: 12px; }
        .tabela-membros td { padding: 12px; border: 1px solid #1a202c; text-align: center; }
    </style>
</head>
<body>

<div id="container-tabela">
    <h3 style="color: #f0a500;">A carregar dados...</h3>
</div>

<script>
    // URL publicada da planilha
    const URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSw-LdIv-3xH3eswHp06gAaxJI8e9aJcrfyuBPPhBIyc6lwHww33rXMhYei5JzTfDxAc96w2kBZ2DWb/pub?output=csv";

    Papa.parse(URL, {
        download: true,
        header: true,
        complete: function(results) {
            const data = results.data;
            let html = '<table class="tabela-membros"><thead><tr><th>ID</th><th>NOME</th><th>PATENTE</th><th>CURSOS</th></tr></thead><tbody>';
            
            data.forEach(row => {
                if (row.ID) {
                    html += `<tr><td>${row.ID}</td><td>${row.Nome || row.NOME || "-"}</td><td>${row.Patente || row.PATENTE || "-"}</td><td>${row.Cursos || row.CURSOS || "-"}</td></tr>`;
                }
            });
            
            html += '</tbody></table>';
            document.getElementById("container-tabela").innerHTML = html;
        },
        error: function(err) {
            document.getElementById("container-tabela").innerHTML = "<p style='color:red;'>Erro ao carregar os dados.</p>";
        }
    });
</script>
</body>
</html>
