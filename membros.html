<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <style>
        body { background-color: #0f131a; color: #e2e8f0; font-family: sans-serif; margin: 0; padding: 20px; }
        .table-container { width: 100%; overflow-x: auto; border: 1px solid #232b3c; border-radius: 8px; }
        table { width: 100%; border-collapse: collapse; background: #0f131a; }
        th { background: #1c2434; color: #f0a500; padding: 12px; text-transform: uppercase; }
        td { padding: 12px; border-bottom: 1px solid #1a202c; text-align: center; }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
</head>
<body>

<div id="tabela-container">
    <h2 style="color: #f0a500;">A carregar dados...</h2>
</div>

<script>
    // A sua URL de CSV publicada
    const URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSw-LdIv-3xH3eswHp06gAaxJI8e9aJcrfyuBPPhBIyc6lwHww33rXMhYei5JzTfDxAc96w2kBZ2DWb/pub?output=csv";

    Papa.parse(URL, {
        download: true,
        header: true,
        complete: function(results) {
            const data = results.data;
            let html = '<div class="table-container"><table><thead><tr><th>ID</th><th>NOME</th><th>PATENTE</th><th>CURSOS</th></tr></thead><tbody>';
            
            data.forEach(row => {
                if (row.ID) {
                    html += `<tr><td>${row.ID}</td><td>${row.Nome || row.NOME || "-"}</td><td>${row.Patente || row.PATENTE || "-"}</td><td>${row.Cursos || row.CURSOS || "-"}</td></tr>`;
                }
            });
            
            html += '</tbody></table></div>';
            document.getElementById("tabela-container").innerHTML = html;
        },
        error: function(err) {
            document.getElementById("tabela-container").innerHTML = "<h3 style='color:red;'>Erro ao carregar. Verifique a publicação da planilha.</h3>";
        }
    });
</script>

</body>
</html>
