<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <style>
        body { background-color: #0b0e14; color: white; font-family: sans-serif; }
        .table-wrapper { background-color: #141923; border-radius: 12px; overflow: hidden; border: 1px solid #232b3c; margin: 20px; }
        table { width: 100%; border-collapse: collapse; }
        th { background-color: #1c2434; color: #f0a500; padding: 15px; font-size: 0.85em; text-transform: uppercase; }
        td { padding: 15px; border-bottom: 1px solid #1a202c; text-align: center; }
        .erro { color: #ff6b6b; padding: 20px; text-align: center; }
    </style>
</head>
<body>

<div class="table-wrapper">
    <table id="tabela">
        <thead>
            <tr>
                <th>ID</th><th>NOME</th><th>BADGE</th><th>PATENTE</th><th>UNIDADE</th><th>ADV</th><th>CFA</th><th>POE</th>
            </tr>
        </thead>
        <tbody id="corpo">
            <tr><td colspan="8">Buscando dados na planilha...</td></tr>
        </tbody>
    </table>
</div>

<script>
    // URL DA SUA PLANILHA PUBLICADA COMO CSV
    const URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSw-LdIv-3xH3eswHp06gAaxJI8e9aJcrfyuBPPhBIyc6lwHww33rXMhYei5JzTfDxAc96w2kBZ2DWb/pub?output=csv";

    Papa.parse(URL, {
        download: true,
        header: true,
        complete: function(results) {
            const corpo = document.getElementById("corpo");
            corpo.innerHTML = "";
            
            if (results.errors.length > 0) {
                corpo.innerHTML = "<tr><td colspan='8' class='erro'>Erro ao ler a planilha. Verifique se ela foi 'Publicada na Web'.</td></tr>";
                console.error(results.errors);
                return;
            }

            results.data.forEach(m => {
                if (m.Nome && m.Nome.trim() !== "") {
                    let c = (m.Cursos || "").toUpperCase();
                    corpo.innerHTML += `<tr>
                        <td>${m.ID || "-"}</td>
                        <td style="text-align:left">${m.Nome}</td>
                        <td>${m.Badge || "-"}</td>
                        <td>${m.Patente || "-"}</td>
                        <td>${m.Unidade || "-"}</td>
                        <td>${m.Advertências || "-"}</td>
                        <td>${c.includes("C.F.A") ? "☑" : "☐"}</td>
                        <td>${c.includes("P.O.E") ? "☑" : "☐"}</td>
                    </tr>`;
                }
            });
        },
        error: function(err) {
            document.getElementById("corpo").innerHTML = "<tr><td colspan='8' class='erro'>Erro de conexão: " + err.message + "</td></tr>";
        }
    });
</script>
</body>
</html>
