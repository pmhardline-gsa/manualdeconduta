<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Efetivo PMHL</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    <style>
        /* === ESTILOS GERAIS === */
        body { 
            background-color: #0b0e14; 
            color: #e2e8f0; 
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; 
            padding: 20px; 
            margin: 0;
        }
        .container { 
            max-width: 1300px; /* Aumentado ligeiramente para acomodar as novas colunas */
            margin: 0 auto; 
            text-align: center; 
        }
        h1 { 
            color: #f0a500; 
            margin-bottom: 20px; 
            text-transform: uppercase; 
            letter-spacing: 2px;
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
        }

        /* === BOTÃO DE CADASTRO === */
        .btn-cadastro { 
            display: inline-block; 
            background: #f0a500; 
            color: #000; 
            padding: 12px 28px; 
            border-radius: 6px; 
            text-decoration: none; 
            font-weight: 800; 
            margin-bottom: 25px; 
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }
        .btn-cadastro:hover { 
            background: #d48e00; 
            transform: translateY(-2px);
            box-shadow: 0 6px 12px rgba(240, 165, 0, 0.2);
        }

        /* === TABELA === */
        .table-container { 
            background: #141923; 
            border-radius: 12px; 
            overflow-x: auto; 
            border: 1px solid #232b3c; 
            box-shadow: 0 8px 16px rgba(0,0,0,0.4);
            height: auto !important; 
            overflow: visible !important;
        }
        table { 
            width: 100%; 
            border-collapse: collapse; 
            white-space: nowrap;
        }
        th { 
            background: #1c2434; 
            color: #f0a500; 
            padding: 14px 12px; 
            font-size: 0.85em; 
            text-transform: uppercase; 
            border: 1px solid #232b3c; 
        }
        td { 
            padding: 12px; 
            border: 1px solid #1a202c; 
            text-align: center; 
            color: #e2e8f0; 
            font-size: 0.95em;
        }
        
        .col-adv { 
            background-color: rgba(240, 165, 0, 0.02); 
            border: 1px solid #1a202c; 
        }
        .cat-row { 
            background: #1c2434; 
            font-weight: bold; 
            text-align: left; 
            padding-left: 20px; 
            color: #f0a500; 
            text-transform: uppercase; 
            letter-spacing: 1px; 
            border-top: 2px solid #2a3449;
        }
        
        /* Efeito Hover nas linhas dos membros */
        tbody tr:not(.cat-row):hover td { 
            background: #1a202c; 
            transition: background 0.2s ease;
        }
        
        /* Status Ativo / Inativo */
        .status-ativo {
            color: #2ed573;
            font-weight: bold;
            background: rgba(46, 213, 115, 0.1);
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 0.85em;
        }
        .status-inativo {
            color: #ff4757;
            font-weight: bold;
            background: rgba(255, 71, 87, 0.1);
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 0.85em;
        }

        /* Ícones de Checkbox */
        .check-marcado { color: #f0a500; font-weight: bold; font-size: 1.1em; }
        .adv-marcado { color: #ff4d4d; font-weight: bold; font-size: 1.1em; }
        .check-vazio { color: #4a5568; font-size: 1.1em; }

        /* Força a tabela a aparecer */
        #corpo { display: table-row-group !important; visibility: visible !important; }
    </style>
</head>
<body>

<div class="container">
    <h1>1º BPM - HARDLINE</h1>
    <a href="https://script.google.com/macros/s/AKfycbwtJEC35f80OO07rPrQ8fuWDcHbqnEQIQyUh8iVRwP-WB-KfIVM_IICr-rweX2eX864/exec" target="_blank" class="btn-cadastro">+ Cadastrar Novo Membro</a>

    <div class="table-container">
        <table id="tabela">
            <thead>
                <tr>
                    <th rowspan="2">ID</th>
                    <th rowspan="2">NOME</th>
                    <th rowspan="2">BADGE</th>
                    <th rowspan="2">PATENTE</th>
                    <th rowspan="2">UNIDADE</th>
                    <th rowspan="2">STATUS</th>
                    <th rowspan="2">DATA ENTRADA</th>
                    <th colspan="3" style="color: #ff4d4d; letter-spacing: 1px;">ADVERTÊNCIAS</th>
                    <th colspan="2">CURSOS</th>
                </tr>
                <tr>
                    <th style="color: #f0a500;">ADV 1</th>
                    <th style="color: #f0a500;">ADV 2</th>
                    <th style="color: #f0a500;">ADV 3</th>
                    <th>C.F.A</th>
                    <th>P.O.E</th>
                </tr>
            </thead>
            <tbody id="corpo">
                <tr><td colspan="12" style="padding: 40px; color: #a0aec0;">Carregando e organizando dados...</td></tr>
            </tbody>
        </table>
    </div>
</div>

<script>
    // URL COM SISTEMA ANTI-CACHE (Burla o atraso de atualização)
    const baseUrl = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSw-LdIv-3xH3eswHp06gAaxJI8e9aJcrfyuBPPhBIyc6lwHww33rXMhYei5JzTfDxAc96w2kBZ2DWb/pub?output=csv";
    const URL = baseUrl + "&_t=" + new Date().getTime();

    // Normaliza textos (Remove acentos e espaços, deixando tudo padrão)
    function limparString(str) {
        if (!str) return "";
        return str.toString().normalize("NFD").replace(/[\u0300-\u036f]/g, "").trim().toUpperCase();
    }

    const hierarquia = {
        "ALTO COMANDO": 1, "COMANDO": 2, "SUB-COMANDO": 3,
        "PILOTO VETERANO": 4, "PILOTO SENIOR": 5, "PILOTO OFICIAL": 6, "PILOTO ESTAGIARIO": 7, "ASPIRANTE A PILOTO": 8,
        "OPERADOR VETERANO": 9, "OPERADOR SENIOR": 10, "OPERADOR OFICIAL": 11, "TRIPULANTE OPERACIONAL": 12, "ASPIRANTE OPERADOR": 13
    };

    Papa.parse(URL, { 
        download: true, 
        header: true,
        skipEmptyLines: true,
        complete: function(res) {
            const corpo = document.getElementById("corpo");
            corpo.innerHTML = "";

            if (!res.data || res.data.length === 0) {
                corpo.innerHTML = `<tr><td colspan="12" style="color:#ff4d4d; padding: 20px;">Nenhum dado encontrado. A planilha pode estar vazia ou o link mudou.</td></tr>`;
                return;
            }

            // LIMPEZA EXTREMA DAS COLUNAS
            let dadosNormalizados = res.data.map(linha => {
                let novaLinha = {};
                for (let chave in linha) {
                    let chaveLimpa = chave.normalize("NFD").replace(/[\u0300-\u036f]/g, "").replace(/[^a-zA-Z0-9]/g, "").toUpperCase();
                    novaLinha[chaveLimpa] = linha[chave];
                }
                novaLinha.PATENTE_ORIGINAL = linha.Patente || linha.PATENTE || novaLinha.PATENTE || "-";
                novaLinha.NOME_ORIGINAL = linha.Nome || linha.NOME || novaLinha.NOME || "-";
                return novaLinha;
            });

            // Pega só quem tem um ID válido
            let membrosValidos = dadosNormalizados.filter(m => m.ID && m.ID.toString().trim() !== "");

            // Ordena pela hierarquia
            membrosValidos.sort((a, b) => {
                let patA = limparString(a.PATENTE);
                let patB = limparString(b.PATENTE);
                return (hierarquia[patA] || 99) - (hierarquia[patB] || 99);
            });

            const categorias = [
                { nome: "ALTO COMANDO / COMANDO", patentes: ["ALTO COMANDO", "COMANDO", "SUB-COMANDO"] },
                { nome: "CORPO DE PILOTOS", patentes: ["PILOTO VETERANO", "PILOTO SENIOR", "PILOTO OFICIAL", "PILOTO ESTAGIARIO", "ASPIRANTE A PILOTO"] },
                { nome: "CORPO DE OPERADORES", patentes: ["OPERADOR VETERANO", "OPERADOR SENIOR", "OPERADOR OFICIAL", "TRIPULANTE OPERACIONAL", "ASPIRANTE OPERADOR"] }
            ];

            categorias.forEach(cat => {
                const membrosDaCategoria = membrosValidos.filter(m => {
                    let pat = limparString(m.PATENTE);
                    return cat.patentes.includes(pat);
                });
                
                if (membrosDaCategoria.length > 0) {
                    corpo.innerHTML += `<tr><td colspan="12" class="cat-row">${cat.nome}</td></tr>`;
                    
                    membrosDaCategoria.forEach(m => {
                        let id = m.ID || "-";
                        let nome = m.NOME_ORIGINAL || m.NOME || "-";
                        let badge = m.BADGE || "-";
                        let patente = m.PATENTE_ORIGINAL || "-";
                        let unidade = m.UNIDADE || "-";
                        let dataEntrada = m.DATAENTRADA || m.DATA || m.DATADEENTRADA || "-";
                        
                        // Tratamento do Status (Ativo / Inativo)
                        let statusBruto = limparString(m.STATUS || m.ATIVO || "ATIVO");
                        let statusHTML = `<span class="status-ativo">ATIVO</span>`;
                        if (statusBruto.includes("INATIVO") || statusBruto === "NAO" || statusBruto === "OFF") {
                            statusHTML = `<span class="status-inativo">INATIVO</span>`;
                        }

                        // Sistema Tolerante para Advertências
                        let advTexto = (m.ADVERTENCIAS || m.ADV || "").toString().toUpperCase().replace(/\s+/g, '');
                        let adv1 = (advTexto.includes("ADV1") || advTexto.includes("ADV2") || advTexto.includes("ADV3")) ? '<span class="adv-marcado">☑</span>' : '<span class="check-vazio">☐</span>';
                        let adv2 = (advTexto.includes("ADV2") || advTexto.includes("ADV3")) ? '<span class="adv-marcado">☑</span>' : '<span class="check-vazio">☐</span>';
                        let adv3 = (advTexto.includes("ADV3")) ? '<span class="adv-marcado">☑</span>' : '<span class="check-vazio">☐</span>';

                        // Sistema Tolerante para Cursos
                        let cursosLimpo = (m.CURSOS || "").toString().toUpperCase().replace(/\s+/g, '');
                        let cfa = (cursosLimpo.includes("C.F.A") || cursosLimpo.includes("CFA")) ? '<span class="check-marcado">☑</span>' : '<span class="check-vazio">☐</span>';
                        let poe = (cursosLimpo.includes("P.O.E") || cursosLimpo.includes("POE")) ? '<span class="check-marcado">☑</span>' : '<span class="check-vazio">☐</span>';

                        corpo.innerHTML += `<tr>
                            <td><strong>${id}</strong></td>
                            <td style="text-align:left; padding-left:15px;">${nome}</td>
                            <td>${badge}</td>
                            <td>${patente}</td>
                            <td>${unidade}</td>
                            <td>${statusHTML}</td>
                            <td>${dataEntrada}</td>
                            
                            <td class="col-adv">${adv1}</td>
                            <td class="col-adv">${adv2}</td>
                            <td class="col-adv">${adv3}</td>
                            
                            <td>${cfa}</td>
                            <td>${poe}</td>
                        </tr>`;
                    });
                }
            });
        }
    });
</script>
</body>
</html>
