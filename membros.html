<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <style>
        body { background-color: #0b0e14; color: #fff; font-family: 'Segoe UI', sans-serif; padding: 20px; }
        .container { max-width: 1200px; margin: 0 auto; text-align: center; }
        h1 { color: #f0a500; }
        .btn-cadastro { display: inline-block; background: #f0a500; color: #000; padding: 12px 24px; border-radius: 6px; text-decoration: none; font-weight: bold; margin-bottom: 25px; }
        .table-container { background: #141923; border-radius: 12px; overflow: hidden; border: 1px solid #232b3c; }
        table { width: 100%; border-collapse: collapse; }
        th { background: #1c2434; color: #f0a500; padding: 12px; font-size: 0.8em; text-transform: uppercase; border: 1px solid #232b3c; }
        td { padding: 12px; border: 1px solid #1a202c; text-align: center; color: #e2e8f0; }
        .categoria { background: #1c2434; font-weight: bold; padding: 10px; }
        
        /* ESTILO PARA AS CAIXAS */
        .check-marcado { color: #f0a500; font-weight: bold; } /* Amarelo */
        .check-vazio { color: #4a5568; } /* Cinza */
        
        tr:hover { background: #1a202c; }
    </style>
</head>
<body>

<div class="container">
    <h1>1º BPM - HARDLINE</h1>
    <a href="URL_DO_SEU_FORMULARIO" target="_blank" class="btn-cadastro">+ Cadastrar Novo Membro</a>

    <div class="table-container">
        <table id="tabela">
            <thead>
                <tr>
                    <th rowspan="2">ID</th><th rowspan="2">NOME</th><th rowspan="2">BADGE</th><th rowspan="2">PATENTE</th><th rowspan="2">UNIDADE</th>
                    <th colspan="3">ADVERTÊNCIAS</th><th colspan="2">CURSOS</th>
                </tr>
                <tr>
                    <th>ADV 1</th><th>ADV 2</th><th>ADV 3</th><th>C.F.A</th><th>P.O.E</th>
                </tr>
            </thead>
            <tbody id="corpo"><tr><td colspan="10">Carregando...</td></tr></tbody>
        </table>
    </div>
</div>

<script>
    const URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSw-LdIv-3xH3eswHp06gAaxJI8e9aJcrfyuBPPhBIyc6lwHww33rXMhYei5JzTfDxAc96w2kBZ2DWb/pub?output=csv";

    function gerarCheck(texto) {
        // Se o texto contiver o item, retorna o ícone com classe amarela, senão, cinza
        const marcado = texto.toUpperCase().includes("X") || texto.includes("☑"); 
        return marcado 
            ? `<span class="check-marcado">☑</span>` 
            : `<span class="check-vazio">☐</span>`;
    }

    Papa.parse(URL, { download: true, header: true, complete: function(res) {
        const corpo = document.getElementById("corpo");
        corpo.innerHTML = "";
        let cat = "";
        
        res.data.forEach(m => {
            if(!m.Nome) return;
            let novaCat = (m.Patente.includes("Piloto")) ? "CORPO DE PILOTOS" : "ALTO COMANDO / COMANDO";
            if(cat !== novaCat) {
                cat = novaCat;
                corpo.innerHTML += `<tr><td colspan="10" class="categoria">${cat}</td></tr>`;
            }
            
            let c = (m.Cursos || "").toUpperCase();
            corpo.innerHTML += `<tr>
                <td>${m.ID}</td><td style="text-align:left">${m.Nome}</td><td>${m.Badge || "-"}</td>
                <td>${m.Patente}</td><td>${m.Unidade || "-"}</td>
                <td>${gerarCheck("")}</td><td>${gerarCheck("")}</td><td>${gerarCheck("")}</td>
                <td>${c.includes("C.F.A") ? '<span class="check-marcado">☑</span>' : '<span class="check-vazio">☐</span>'}</td>
                <td>${c.includes("P.O.E") ? '<span class="check-marcado">☑</span>' : '<span class="check-vazio">☐</span>'}</td>
            </tr>`;
        });
    }});
</script>
</body>
</html>
