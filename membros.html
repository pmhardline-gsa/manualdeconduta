<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>1º BPM - HARDLINE</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    <style>
        /* Estilização Forçada */
        body { background-color: #141923 !important; color: #e2e8f0 !important; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 20px; }
        .main-container { max-width: 1200px; margin: 0 auto; text-align: center; }
        .titulo-principal { color: #f0a500 !important; margin-bottom: 20px; font-size: 2em; }
        
        .table-container { background: #141923 !important; border-radius: 12px; overflow-x: auto; border: 1px solid #232b3c; padding: 20px; }
        .tabela-membros { width: 100% !important; border-collapse: collapse !important; background: #141923 !important; }
        .tabela-membros th { background: #1c2434 !important; color: #f0a500 !important; padding: 12px !important; text-transform: uppercase; border: 1px solid #232b3c !important; }
        .tabela-membros td { padding: 12px !important; border: 1px solid #1a202c !important; text-align: center !important; color: #e2e8f0 !important; }
        
        .btn-cadastro { display: inline-block; background: #f0a500; color: #000; padding: 10px 20px; border-radius: 5px; text-decoration: none; font-weight: bold; margin-bottom: 20px; }
        .check { color: #f0a500; font-weight: bold; }
        .none { color: #4a5568; }
    </style>
</head>
<body>

<div class="main-container">
    <h1 class="titulo-principal">1º BPM - HARDLINE</h1>
    <a href="https://script.google.com/macros/s/AKfycbwtJEC35f80OO07rPrQ8fuWDcHbqnEQIQyUh8iVRwP-WB-KfIVM_IICr-rweX2eX864/exec" target="_blank" class="btn-cadastro">+ Cadastrar Novo Membro</a>
    <div id="container-tabela" class="table-container">
        <p style="color: #a0aec0;">Carregando dados da planilha...</p>
    </div>
</div>

<script>
    // URL da planilha publicada como CSV
    const URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSw-LdIv-3xH3eswHp06gAaxJI8e9aJcrfyuBPPhBIyc6lwHww33rXMhYei5JzTfDxAc96w2kBZ2DWb/pub?output=csv";

    Papa.parse(URL, {
        download: true,
        header: true,
        skipEmptyLines: true,
        complete: function(results) {
            const data = results.data;
            let html = `
            <table class="tabela-membros">
                <thead>
                    <tr>
                        <th rowspan="2">ID</th>
                        <th rowspan="2">NOME</th>
                        <th rowspan="2">BADGE</th>
                        <th rowspan="2">PATENTE</th>
                        <th rowspan="2">UNIDADE</th>
                        <th colspan="3">ADVERTÊNCIAS</th>
                        <th colspan="2">CURSOS</th>
                    </tr>
                    <tr>
                        <th>ADV 1</th><th>ADV 2</th><th>ADV 3</th>
                        <th>C.F.A</th><th>P.O.E</th>
                    </tr>
                </thead>
                <tbody>`;
            
            data.forEach(row => {
                if (row.ID && row.ID.trim() !== "") {
                    // Lógica simples para marcar checks (ajuste conforme a sua coluna)
                    const adv = (row.Advertências || row.ADVERTENCIAS || "").toUpperCase();
                    const cursos = (row.Cursos || row.CURSOS || "").toUpperCase();
                    
                    html += `<tr>
                        <td>${row.ID}</td>
                        <td>${row.Nome || row.NOME || "-"}</td>
                        <td>${row.Badge || row.BADGE || "-"}</td>
                        <td>${row.Patente || row.PATENTE || "-"}</td>
                        <td>${row.Unidade || row.UNIDADE || "-"}</td>
                        <td>${adv.includes("ADV1") ? '<span class="check">☑</span>' : '<span class="none">☐</span>'}</td>
                        <td>${adv.includes("ADV2") ? '<span class="check">☑</span>' : '<span class="none">☐</span>'}</td>
                        <td>${adv.includes("ADV3") ? '<span class="check">☑</span>' : '<span class="none">☐</span>'}</td>
                        <td>${cursos.includes("C.F.A") ? '<span class="check">☑</span>' : '<span class="none">☐</span>'}</td>
                        <td>${cursos.includes("P.O.E") ? '<span class="check">☑</span>' : '<span class="none">☐</span>'}</td>
                    </tr>`;
                }
            });
            
            html += '</tbody></table>';
            document.getElementById("container-tabela").innerHTML = html;
        },
        error: function(err) {
            document.getElementById("container-tabela").innerHTML = "<p style='color:red;'>Erro ao ler planilha. Verifique se ela foi Publicada na Web.</p>";
        }
    });
</script>

</body>
</html>
