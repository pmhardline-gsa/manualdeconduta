<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Efetivo PMHL</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    <style>
        body { background-color: #0b0e14; color: #fff; font-family: 'Segoe UI', sans-serif; padding: 20px; }
        .container { max-width: 1200px; margin: 0 auto; text-align: center; }
        h1 { color: #f0a500; margin-bottom: 20px; }
        .btn-cadastro { display: inline-block; background: #f0a500; color: #000; padding: 12px 24px; border-radius: 6px; text-decoration: none; font-weight: bold; margin-bottom: 25px; transition: 0.3s; }
        .btn-cadastro:hover { background: #d48e00; }
        .table-container { background: #141923; border-radius: 12px; overflow: hidden; border: 1px solid #232b3c; }
        table { width: 100%; border-collapse: collapse; }
        th { background: #1c2434; color: #f0a500; padding: 12px; font-size: 0.8em; text-transform: uppercase; border: 1px solid #232b3c; }
        td { padding: 12px; border: 1px solid #1a202c; text-align: center; color: #e2e8f0; }
        
        .col-adv { background-color: rgba(240, 165, 0, 0.04); border: 1px solid #1a202c; }
        .cat-row { background: #1c2434; font-weight: bold; text-align: left; padding-left: 20px; color: #f0a500; text-transform: uppercase; letter-spacing: 1px; }
        tr:hover { background: #1a202c; }
        
        .check-marcado { color: #f0a500; font-weight: bold; }
        .adv-marcado { color: #ff4d4d; font-weight: bold; }
        .check-vazio { color: #4a5568; }
    </style>
</head>
<body>

<div class="container">
    <h1>1º BPM - HARDLINE</h1>
    <a href="https://script.google.com/macros/s/AKfycbwtJEC35f80OO07rPrQ8fuWDcHbqnEQIQyUh8iVRwP-WB-KfIVM_IICr-rweX2eX864/exec" target="_blank" class="btn-cadastro">+ Cadastrar Novo Membro</a>

    <div class="table-container">
        <table id="tabela">
            <thead>
                <tr>
                    <th rowspan="2">ID</th><th rowspan="2">NOME</th><th rowspan="2">BADGE</th><th rowspan="2">PATENTE</th><th rowspan="2">UNIDADE</th>
                    <th colspan="3" style="color: #ff4d4d; letter-spacing: 1px;">ADVERTÊNCIAS</th><th colspan="2">CURSOS</th>
                </tr>
                <tr>
                    <th style="color: #f0a500;">ADV 1</th><th style="color: #f0a500;">ADV 2</th><th style="color: #f0a500;">ADV 3</th><th>C.F.A</th><th>P.O.E</th>
                </tr>
            </thead>
            <tbody id="corpo"></tbody>
        </table>
    </div>
</div>

<script>
    const URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSw-LdIv-3xH3eswHp06gAaxJI8e9aJcrfyuBPPhBIyc6lwHww33rXMhYei5JzTfDxAc96w2kBZ2DWb/pub?output=csv";

    const hierarquia = {
        "Alto Comando": 1, "Comando": 2, "Sub-Comando": 3,
        "Piloto Veterano": 4, "Piloto Sênior": 5, "Piloto Oficial": 6, "Piloto Estagiário": 7, "Aspirante a Piloto": 8,
        "Operador Veterano": 9, "Operador Sênior": 10, "Operador Oficial": 11, "Tripulante Operacional": 12, "Aspirante Operador": 13
    };

    Papa.parse(URL, { 
        download: true, 
        header: true,
        
        // Esta função limpa invisibilidades: transforma " Advertências " em "ADVERTENCIAS" 
        transformHeader: function(header) {
            return header.trim().toUpperCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "");
        },
        
        complete: function(res) {
            const corpo = document.getElementById("corpo");
            corpo.innerHTML = "";

            // Filtra pegando da coluna limpa "ID" e ordena pela coluna limpa "PATENTE"
            let membrosOrdenados = res.data.filter(m => {
                let id = m.ID || "";
                return id.toString().trim() !== "";
            }).sort((a, b) => {
                let patA = a.PATENTE || "";
                let patB = b.PATENTE || "";
                return (hierarquia[patA.trim()] || 99) - (hierarquia[patB.trim()] || 99);
            });

            const categorias = [
                { nome: "ALTO COMANDO / COMANDO", patentes: ["Alto Comando", "Comando", "Sub-Comando"] },
                { nome: "CORPO DE PILOTOS", patentes: ["Piloto Veterano", "Piloto Sênior", "Piloto Oficial", "Piloto Estagiário", "Aspirante a Piloto"] },
                { nome: "CORPO DE OPERADORES", patentes: ["Operador Veterano", "Operador Sênior", "Operador Oficial", "Tripulante Operacional", "Aspirante Operador"] }
            ];

            categorias.forEach(cat => {
                const membrosDaCategoria = membrosOrdenados.filter(m => {
                    let pat = m.PATENTE || "";
                    return cat.patentes.includes(pat.trim());
                });
                
                if (membrosDaCategoria.length > 0) {
                    corpo.innerHTML += `<tr><td colspan="10" class="cat-row">${cat.nome}</td></tr>`;
                    
                    membrosDaCategoria.forEach(m => {
                        // Resgata os dados mapeando para os nomes já limpos pelo transformHeader
                        let id = m.ID || "-";
                        let nome = m.NOME || "-";
                        let badge = m.BADGE || "-";
                        let patente = m.PATENTE || "-";
                        let unidade = m.UNIDADE || "-";
                        let cursos = (m.CURSOS || "").toString().toUpperCase();
                        
                        // Busca a advertência. Como removemos os acentos, a chave agora é ADVERTENCIAS
                        let advTexto = (m.ADVERTENCIAS || m.ADV || "").toString().toUpperCase().replace(/\s+/g, '');

                        // Lógica das Advertências
                        let adv1 = (advTexto.includes("ADV1") || advTexto.includes("ADV2") || advTexto.includes("ADV3")) 
                            ? `<span class="adv-marcado">☑</span>` : `<span class="check-vazio">☐</span>`;
                            
                        let adv2 = (advTexto.includes("ADV2") || advTexto.includes("ADV3")) 
                            ? `<span class="adv-marcado">☑</span>` : `<span class="check-vazio">☐</span>`;
                            
                        let adv3 = (advTexto.includes("ADV3")) 
                            ? `<span class="adv-marcado">☑</span>` : `<span class="check-vazio">☐</span>`;

                        corpo.innerHTML += `<tr>
                            <td>${id}</td>
                            <td style="text-align:left; padding-left:15px;">${nome}</td>
                            <td>${badge}</td>
                            <td>${patente}</td>
                            <td>${unidade}</td>
                            
                            <td class="col-adv">${adv1}</td>
                            <td class="col-adv">${adv2}</td>
                            <td class="col-adv">${adv3}</td>
                            
                            <td class="${cursos.includes("C.F.A") ? 'check-marcado' : 'check-vazio'}">${cursos.includes("C.F.A") ? "☑" : "☐"}</td>
                            <td class="${cursos.includes("P.O.E") ? 'check-marcado' : 'check-vazio'}">${cursos.includes("P.O.E") ? "☑" : "☐"}</td>
                        </tr>`;
                    });
                }
            });
        }
    });
</script>
</body>
</html>
