<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>1º BPM - HARDLINE</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    <style>
        /* === ESTILOS GERAIS === */
        :root {
            --bg-color: #0b101e; /* Fundo mais escuro e elegante */
            --bg-table: #131a2b; /* Fundo da tabela */
            --bg-header: #1c263b; /* Fundo do cabeçalho da tabela */
            --text-main: #e2e8f0;
            --accent: #f0a500; /* Laranja/Dourado Hardline */
            --accent-hover: #d18f00;
            --border-color: #2a3449;
            --row-hover: #1e293b;
        }

        body { 
            background-color: var(--bg-color); 
            color: var(--text-main); 
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; 
            margin: 0; 
            padding: 20px; 
            box-sizing: border-box;
        }

        .main-container {
            max-width: 1100px;
            margin: 0 auto;
        }

        /* === CABEÇALHO E BOTÃO === */
        .header-section {
            text-align: center;
            margin-bottom: 30px;
        }

        .titulo-principal {
            color: var(--accent);
            font-size: 2.2rem;
            margin-bottom: 20px;
            text-transform: uppercase;
            letter-spacing: 2px;
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
        }

        .btn-cadastro {
            display: inline-block;
            background-color: var(--accent);
            color: #000;
            padding: 12px 28px;
            border-radius: 6px;
            text-decoration: none;
            font-weight: 800;
            font-size: 1rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: all 0.3s ease;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
        }

        .btn-cadastro:hover {
            background-color: var(--accent-hover);
            transform: translateY(-2px);
            box-shadow: 0 6px 12px rgba(240, 165, 0, 0.2);
        }

        /* === TABELA === */
        .table-wrapper {
            background-color: var(--bg-table);
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 8px 16px rgba(0,0,0,0.4);
            border: 1px solid var(--border-color);
        }

        .table-responsive {
            width: 100%;
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            text-align: center;
            white-space: nowrap;
        }

        th {
            background-color: var(--bg-header);
            color: var(--accent);
            padding: 16px;
            font-size: 0.95rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            border-bottom: 2px solid var(--border-color);
        }

        td {
            padding: 14px 16px;
            border-bottom: 1px solid var(--border-color);
            color: var(--text-main);
            font-size: 0.95rem;
        }

        /* Efeito Zebra e Hover nas linhas */
        tbody tr:nth-child(even) {
            background-color: rgba(255, 255, 255, 0.02);
        }

        tbody tr:hover {
            background-color: var(--row-hover);
            transition: background-color 0.2s ease;
        }

        /* Estilização para células vazias */
        .empty-cell {
            color: #64748b;
        }

        /* Mensagem de carregamento */
        .loading-msg {
            text-align: center;
            padding: 40px;
            font-size: 1.2rem;
            color: #94a3b8;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { opacity: 0.6; }
            50% { opacity: 1; }
            100% { opacity: 0.6; }
        }
    </style>
</head>
<body>

<div class="main-container">
    <div class="header-section">
        <h1 class="titulo-principal">1º BPM - HARDLINE</h1>
        <a href="https://script.google.com/macros/s/AKfycbwtJEC35f80OO07rPrQ8fuWDcHbqnEQIQyUh8iVRwP-WB-KfIVM_IICr-rweX2eX864/exec" target="_blank" class="btn-cadastro">+ Cadastrar Novo Membro</a>
    </div>

    <div class="table-wrapper">
        <div id="container-tabela" class="table-responsive">
            <div class="loading-msg">Sincronizando dados com a base...</div>
        </div>
    </div>
</div>

<script>
    // URL publicada da planilha
    const URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSw-LdIv-3xH3eswHp06gAaxJI8e9aJcrfyuBPPhBIyc6lwHww33rXMhYei5JzTfDxAc96w2kBZ2DWb/pub?output=csv";

    Papa.parse(URL, {
        download: true,
        header: true,
        skipEmptyLines: true,
        complete: function(results) {
            const data = results.data;
            let html = `
                <table>
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>NOME</th>
                            <th>PATENTE</th>
                            <th>CURSOS</th>
                        </tr>
                    </thead>
                    <tbody>
            `;
            
            data.forEach(row => {
                if (row.ID && row.ID.trim() !== "") {
                    // Função simples para estilizar células vazias
                    const formatCell = (val) => val && val !== "-" ? val : '<span class="empty-cell">-</span>';
                    
                    html += `<tr>
                        <td><strong>${formatCell(row.ID)}</strong></td>
                        <td>${formatCell(row.Nome || row.NOME)}</td>
                        <td>${formatCell(row.Patente || row.PATENTE)}</td>
                        <td>${formatCell(row.Cursos || row.CURSOS)}</td>
                    </tr>`;
                }
            });
            
            html += '</tbody></table>';
            document.getElementById("container-tabela").innerHTML = html;
        },
        error: function(err) {
            document.getElementById("container-tabela").innerHTML = "<div class='loading-msg' style='color: #ef4444; animation: none;'>Erro ao carregar a base de dados. Tente atualizar a página.</div>";
        }
    });
</script>

</body>
</html>
