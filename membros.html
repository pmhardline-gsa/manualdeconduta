<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <style>
        body { background-color: #0b0e14; color: #fff; font-family: 'Segoe UI', sans-serif; padding: 20px; }
        .table-container { max-width: 1200px; margin: 0 auto; background: #141923; border-radius: 12px; overflow: hidden; border: 1px solid #232b3c; }
        table { width: 100%; border-collapse: collapse; }
        th { background: #1c2434; color: #f0a500; padding: 15px; text-transform: uppercase; font-size: 0.85em; }
        td { padding: 15px; border-bottom: 1px solid #1a202c; text-align: center; color: #e2e8f0; }
        .categoria { background: #1c2434; font-weight: bold; text-transform: uppercase; letter-spacing: 1px; padding: 12px; }
        tr:hover { background: #1a202c; }
        .check { color: #f0a500; font-weight: bold; }
    </style>
</head>
<body>

<div class="table-container">
    <table id="tabela-membros">
        <thead>
            <tr>
                <th>ID</th><th>NOME</th><th>BADGE</th><th>PATENTE</th><th>UNIDADE</th><th>ADV</th>
                <th colspan="2">CURSOS</th>
            </tr>
            <tr>
                <th></th><th></th><th></th><th></th><th></th><th></th><th>C.F.A</th><th>P.O.E</th>
            </tr>
        </thead>
        <tbody id="corpo-tabela"><tr><td colspan="8">Carregando dados...</td></tr></tbody>
    </table>
</div>

<script>
    const URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSw-LdIv-3xH3eswHp06gAaxJI8e9aJcrfyuBPPhBIyc6lwHww33rXMhYei5JzTfDxAc96w2kBZ2DWb/pub?output=csv";

    Papa.parse(URL, { download: true, header: true, complete: function(results) {
        const corpo = document.getElementById("corpo-tabela");
        corpo.innerHTML = "";
        let categoriaAtual = "";

        results.data.forEach(membro => {
            if (!membro.Nome) return;
            
            // Lógica de Categorias
            let novaCat = (membro.Patente.includes("Piloto") || membro.Patente.includes("Aspirante")) ? "CORPO DE PILOTOS" : "ALTO COMANDO / COMANDO";
            if (categoriaAtual !== novaCat) {
                categoriaAtual = novaCat;
                corpo.innerHTML += `<tr><td colspan="8" class="categoria">${categoriaAtual}</td></tr>`;
            }

            let cursos = (membro.Cursos || "").toUpperCase();
            corpo.innerHTML += `<tr>
                <td>${membro.ID}</td><td style="text-align:left">${membro.Nome}</td><td>${membro.Badge || "-"}</td>
                <td>${membro.Patente}</td><td>${membro.Unidade || "-"}</td><td>-</td>
                <td class="check">${cursos.includes("C.F.A") ? "☑" : "☐"}</td>
                <td class="check">${cursos.includes("P.O.E") ? "☑" : "☐"}</td>
            </tr>`;
        });
    }});
</script>
</body>
</html>
