<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <style>
    body { background: #0b0e14; color: #e2e8f0; font-family: sans-serif; padding: 20px; }
    h2 { color: #f0a500; border-bottom: 2px solid #f0a500; display: inline-block; margin-top: 30px; }
    .grid { display: flex; gap: 20px; flex-wrap: wrap; margin-top: 15px; }
    .card { background: #1a202c; border: 1px solid #4a5568; padding: 15px; border-radius: 10px; width: 180px; text-align: center; }
    .nome { color: #f0a500; font-weight: bold; }
  </style>
</head>
<body>
  <h1>ESTRUTURA HIERÁRQUICA</h1>
  
  <h2>Comando</h2>
  <div id="comando" class="grid"></div>
  
  <h2>Efetivo</h2>
  <div id="efetivo" class="grid"></div>

  <script>
    const url = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSw-LdIv-3xH3eswHp06gAaxJI8e9aJcrfyuBPPhBIyc6lwHww33rXMhYei5JzTfDxAc96w2kBZ2DWb/pub?output=csv';

    fetch(url)
      .then(res => res.text())
      .then(data => {
        const rows = data.split('\n').slice(1);
        rows.forEach(row => {
          const [nome, id, status, cargo] = row.split(','); // Certifique-se que o cargo é a 4ª coluna
          if(!nome) return;
          
          const html = `<div class="card"><div class="nome">${nome}</div><div>ID: ${id}</div><div style="font-size:0.8em">Status: ${status}</div></div>`;
          
          // Filtra onde colocar o card
          if(cargo && cargo.trim().toLowerCase() === 'comando') {
            document.getElementById('comando').innerHTML += html;
          } else {
            document.getElementById('efetivo').innerHTML += html;
          }
        });
      });
  </script>
</body>
</html>
