<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Organograma</title>
    <style>
        body { background-color: #0b0e14; color: white; font-family: sans-serif; padding: 20px; text-align: center; }
        .quadro { display: inline-block; background: #1a252f; border: 1px solid #34495e; padding: 15px; margin: 5px; border-radius: 8px; }
        .container { display: flex; justify-content: center; gap: 20px; margin-top: 20px; }
    </style>
</head>
<body>
    <h1>Cadeia de Comando PMHL-GSA</h1>
    <div id="topo"></div>
    <div class="container">
        <div class="quadro"><h3>PILOTOS</h3><div id="pilotos"></div></div>
        <div class="quadro"><h3>OPERADORES</h3><div id="operadores"></div></div>
    </div>
    <script>
        fetch('https://docs.google.com/spreadsheets/d/e/2PACX-1vSw-LdIv-3xH3eswHp06gAaxJI8e9aJcrfyuBPPhBIyc6lwHww33rXMhYei5JzTfDxAc96w2kBZ2DWb/pub?output=csv')
        .then(res => res.text()).then(data => {
            data.split('\n').slice(1).forEach(row => {
                const [id, nome, badge, patente] = row.split(',');
                if(!nome) return;
                if(['Alto Comando', 'Comando', 'Sub-Comando'].includes(patente.trim())) {
                    document.getElementById('topo').innerHTML += `<div class="quadro">${patente} - ${nome}</div>`;
                } else if (patente.toLowerCase().includes('piloto')) {
                    document.getElementById('pilotos').innerHTML += `<div>${nome}</div>`;
                } else {
                    document.getElementById('operadores').innerHTML += `<div>${nome}</div>`;
                }
            });
        });
    </script>
</body>
</html>
