<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <style>
        :root { --primary: #2c3e50; --gold: #f1c40f; }
        body { background: #0b0e14; color: #fff; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .node { background: #1a252f; border: 1px solid #34495e; padding: 15px; border-radius: 8px; margin: 10px; text-align: center; width: 250px; }
        .grid { display: flex; gap: 20px; justify-content: center; }
        .rank-list { list-style: none; padding: 0; }
        .rank-item { padding: 8px; border-bottom: 1px solid #2c3e50; }
        .gold { color: var(--gold); font-weight: bold; }
    </style>
</head>
<body>
    <h1>CADEIA DE COMANDO PMHL-GSA</h1>
    
    <div class="node"><strong>[ ALTO COMANDO ]</strong><br>Instância Máxima</div>
    <div style="font-size: 20px;">⬇️</div>
    <div class="node"><strong>[ COMANDO ]</strong><br>Decisões</div>
    
    <div class="grid">
        <div class="node">
            <h3 class="gold">PILOTOS</h3>
            <ul class="rank-list" id="pilotos"></ul>
        </div>
        <div class="node">
            <h3 class="gold">OPERADORES</h3>
            <ul class="rank-list" id="operadores"></ul>
        </div>
    </div>

    <script>
        const url = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSw-LdIv-3xH3eswHp06gAaxJI8e9aJcrfyuBPPhBIyc6lwHww33rXMhYei5JzTfDxAc96w2kBZ2DWb/pub?output=csv';
        
        fetch(url).then(res => res.text()).then(data => {
            const rows = data.split('\n').slice(1);
            rows.forEach(row => {
                const [nome, id, status, cargo] = row.split(',');
                if(!nome) return;
                const li = `<li class="rank-item">${nome} (ID: ${id})</li>`;
                if(cargo.trim() === 'piloto') document.getElementById('pilotos').innerHTML += li;
                else document.getElementById('operadores').innerHTML += li;
            });
        });
    </script>
</body>
</html>
