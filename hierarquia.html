<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <style>
        body { background: #0b0e14; color: #fff; font-family: 'Segoe UI', sans-serif; display: flex; flex-direction: column; align-items: center; padding: 40px; }
        
        /* Efeito de entrada */
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        
        .topo-container { display: flex; flex-direction: column; align-items: center; gap: 10px; margin-bottom: 40px; }
        .node { background: #1a252f; border: 1px solid #34495e; padding: 15px 30px; border-radius: 8px; text-align: center; width: 250px; animation: fadeIn 0.6s ease-out; box-shadow: 0 4px 6px rgba(0,0,0,0.3); }
        
        .grid-baixo { display: grid; grid-template-columns: 1fr 1fr; gap: 40px; width: 100%; max-width: 800px; }
        .quadro { background: #1a252f; border: 1px solid #34495e; padding: 20px; border-radius: 12px; animation: fadeIn 0.8s ease-out; }
        
        h3 { color: #f1c40f; text-align: center; border-bottom: 2px solid #f1c40f; padding-bottom: 10px; text-transform: uppercase; }
        .rank-item { padding: 10px; border-bottom: 1px solid #2c3e50; font-size: 0.95em; transition: 0.3s; }
        .rank-item:hover { color: #f1c40f; background: #232f3b; border-radius: 4px; }
    </style>
</head>
<body>
    <div id="topo" class="topo-container"></div>
    <div class="grid-baixo">
        <div class="quadro"><h3>Pilotos</h3><div id="pilotos"></div></div>
        <div class="quadro"><h3>Operadores</h3><div id="operadores"></div></div>
    </div>

    <script>
        const url = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSw-LdIv-3xH3eswHp06gAaxJI8e9aJcrfyuBPPhBIyc6lwHww33rXMhYei5JzTfDxAc96w2kBZ2DWb/pub?output=csv';
        
        fetch(url).then(res => res.text()).then(data => {
            const rows = data.split('\n').slice(1);
            rows.forEach(row => {
                const [id, nome, badge, patente] = row.split(',');
                if(!nome) return;
                const p = patente.trim();
                
                if (['Alto Comando', 'Comando', 'Sub-Comando'].includes(p)) {
                    document.getElementById('topo').innerHTML += `<div class="node"><strong>[ ${p.toUpperCase()} ]</strong><br>${nome}</div>`;
                } else if (p.toLowerCase().includes('piloto')) {
                    document.getElementById('pilotos').innerHTML += `<div class="rank-item">${p} | ${nome}</div>`;
                } else {
                    document.getElementById('operadores').innerHTML += `<div class="rank-item">${p} | ${nome}</div>`;
                }
            });
        });
    </script>
</body>
</html>
