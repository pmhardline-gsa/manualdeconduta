<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Hierarquia GSA</title>
    <style>
        body { background: #0b0e14; color: white; font-family: sans-serif; display: flex; justify-content: center; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; width: 90%; padding: 40px; }
        .card { background: #1a202c; border: 1px solid #4a5568; padding: 20px; border-radius: 12px; transition: 0.3s; text-align: center; }
        .card:hover { transform: translateY(-10px); border-color: #f0a500; box-shadow: 0 0 20px rgba(240, 165, 0, 0.2); }
        .rank { color: #f0a500; font-weight: bold; }
    </style>
</head>
<body>

<div class="grid" id="hierarquia-container"></div>

<script>
    // Substitua pelo link do seu CSV publicado
    const csvUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSw-LdIv-3xH3eswHp06gAaxJI8e9aJcrfyuBPPhBIyc6lwHww33rXMhYei5JzTfDxAc96w2kBZ2DWb/pub?output=csv';

    async function carregarHierarquia() {
        const response = await fetch(csvUrl);
        const data = await response.text();
        const linhas = data.split('\n').slice(1); // Ignora cabeçalho
        
        const container = document.getElementById('hierarquia-container');
        
        linhas.forEach(linha => {
            const [nome, patente, status] = linha.split(',');
            if (!nome) return;
            
            container.innerHTML += `
                <div class="card">
                    <div class="rank">${patente}</div>
                    <h3>${nome}</h3>
                    <p>Status: ${status}</p>
                </div>
            `;
        });
    }
    carregarHierarquia();
</script>
</body>
</html>
