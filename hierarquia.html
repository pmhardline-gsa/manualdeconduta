<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Organograma GSA</title>
    <style>
        body { background: #0b0e14; color: #fff; font-family: 'Segoe UI', sans-serif; padding: 40px; display: flex; flex-direction: column; align-items: center; }
        
        @keyframes fadeIn { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
        
        .node { background: #1a252f; border: 1px solid #34495e; padding: 15px; border-radius: 8px; margin: 8px; text-align: center; width: 280px; animation: fadeIn 0.6s ease-out; cursor: pointer; transition: 0.3s; }
        .node:hover { border-color: #f1c40f; transform: scale(1.02); }
        
        .grid-baixo { display: grid; grid-template-columns: 1fr 1fr; gap: 40px; width: 100%; max-width: 800px; margin-top: 30px; }
        .quadro { background: #1a252f; border: 1px solid #34495e; padding: 20px; border-radius: 12px; }
        
        h3 { color: #f1c40f; text-align: center; border-bottom: 2px solid #f1c40f; padding-bottom: 10px; text-transform: uppercase; }
        .rank-item { padding: 12px; border-bottom: 1px solid #2c3e50; cursor: pointer; transition: 0.3s; animation: fadeIn 0.8s ease-out; }
        .rank-item:hover { color: #f1c40f; background: #232f3b; }
        
        .detalhes { display: none; font-size: 0.85em; color: #a0aec0; margin-top: 8px; border-top: 1px dashed #4a5568; padding-top: 5px; font-weight: bold; }
    </style>
</head>
<body>

    <div id="topo-hierarquia" style="display:flex; flex-direction:column; align-items:center;"></div>

    <div class="grid-baixo">
        <div class="quadro"><h3>PILOTOS</h3><div id="lista-pilotos"></div></div>
        <div class="quadro"><h3>OPERADORES</h3><div id="lista-operadores"></div></div>
    </div>

    <script>
        const url = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSw-LdIv-3xH3eswHp06gAaxJI8e9aJcrfyuBPPhBIyc6lwHww33rXMhYei5JzTfDxAc96w2kBZ2DWb/pub?output=csv';
        const hierarquia = { 'Alto Comando': 3, 'Comando': 2, 'Sub-Comando': 1 };

        fetch(url).then(res => res.text()).then(data => {
            const rows = data.split('\n').slice(1);
            let comandoList = [];

            rows.forEach(row => {
                const [id, nome, badge, patente] = row.split(',');
                if(!nome) return;
                const p = patente.trim();

                const onclickAction = "let d = this.querySelector('.detalhes'); d.style.display = (d.style.display === 'block') ? 'none' : 'block';";

                if (hierarquia[p] !== undefined) {
                    comandoList.push({p, nome, id, badge, nivel: hierarquia[p]});
                } else if (p.toLowerCase().includes('piloto')) {
                    document.getElementById('lista-pilotos').innerHTML += `
                        <div class="rank-item" onclick="${onclickAction}">
                            ${p} | ${nome}
                            <div class="detalhes">ID: ${id} | Badge: ${badge}</div>
                        </div>`;
                } else {
                    document.getElementById('lista-operadores').innerHTML += `
                        <div class="rank-item" onclick="${onclickAction}">
                            ${p} | ${nome}
                            <div class="detalhes">ID: ${id} | Badge: ${badge}</div>
                        </div>`;
                }
            });

            // Ordena o topo pela hierarquia definida
            comandoList.sort((a, b) => b.nivel - a.nivel);
            comandoList.forEach(item => {
                document.getElementById('topo-hierarquia').innerHTML += `
                    <div class="node" onclick="let d = this.querySelector('.detalhes'); d.style.display = (d.style.display === 'block') ? 'none' : 'block';">
                        <strong>[ ${item.p.toUpperCase()} ]</strong><br>${item.nome}
                        <div class="detalhes">ID: ${item.id} | Badge: ${item.badge}</div>
                    </div>`;
            });
        });
    </script>
</body>
</html>
