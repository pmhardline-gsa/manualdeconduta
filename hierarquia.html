<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Organograma GSA</title>
  <style>
    body { background: #0b0e14; color: #e2e8f0; font-family: sans-serif; padding: 20px; }
    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 15px; margin-top: 20px; }
    .card { background: #1a202c; border: 1px solid #4a5568; border-radius: 10px; padding: 15px; text-align: center; transition: 0.3s; }
    .card:hover { transform: translateY(-5px); border-color: #f0a500; }
    .nome { color: #f0a500; font-weight: bold; }
  </style>
</head>
<body>
  <h1>ESTRUTURA HIERÁRQUICA</h1>
  <div id="container" class="grid"></div>

  <script>
    const url = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSw-LdIv-3xH3eswHp06gAaxJI8e9aJcrfyuBPPhBIyc6lwHww33rXMhYei5JzTfDxAc96w2kBZ2DWb/pub?output=csv';

    fetch(url)
      .then(response => response.text())
      .then(data => {
        const rows = data.split('\n').slice(1);
        const container = document.getElementById('container');
        rows.forEach(row => {
          const [nome, id, status] = row.split(',');
          if(nome) {
            container.innerHTML += `
              <div class="card">
                <div class="nome">${nome}</div>
                <div>ID: ${id}</div>
                <div style="font-size: 0.8em; margin-top:5px;">Status: ${status}</div>
              </div>`;
          }
        });
      });
  </script>
</body>
</html>
