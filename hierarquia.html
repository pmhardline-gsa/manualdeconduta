<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <style>
    body { background: #0b0e14; color: #e2e8f0; font-family: sans-serif; padding: 20px; }
    h2 { color: #f0a500; border-bottom: 2px solid #f0a500; display: inline-block; margin-top: 30px; }
    .grid { display: flex; gap: 20px; flex-wrap: wrap; margin-top: 15px; }
    
    /* Animação */
    .card { 
      background: #1a202c; border: 1px solid #4a5568; padding: 15px; border-radius: 10px; 
      width: 180px; text-align: center; transition: 0.3s;
      animation: fadeIn 0.8s ease-in-out;
    }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    .card:hover { transform: translateY(-5px); border-color: #f0a500; }
    .nome { color: #f0a500; font-weight: bold; }
  </style>
</head>
<body>
  <h1>ESTRUTURA HIERÁRQUICA</h1>
  
  <div id="hierarquia-total"></div>

  <script>
    const url = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSw-LdIv-3xH3eswHp06gAaxJI8e9aJcrfyuBPPhBIyc6lwHww33rXMhYei5JzTfDxAc96w2kBZ2DWb/pub?output=csv';

    fetch(url)
      .then(res => res.text())
      .then(data => {
        const rows = data.split('\n').slice(1);
        let estrutura = {};

        rows.forEach(row => {
          const [nome, id, status, cargo] = row.split(',');
          if(!nome) return;
          const key = cargo ? cargo.trim() : 'Outros';
          if(!estrutura[key]) estrutura[key] = [];
          estrutura[key].push({nome, id, status});
        });

        const container = document.getElementById('hierarquia-total');
        for (const cargo in estrutura) {
          container.innerHTML += `<h2>${cargo}</h2><div class="grid" id="${cargo}"></div>`;
          estrutura[cargo].forEach(membro => {
            document.getElementById(cargo).innerHTML += `
              <div class="card">
                <div class="nome">${membro.nome}</div>
                <div>ID: ${membro.id}</div>
                <div style="font-size:0.8em">Status: ${membro.status}</div>
              </div>`;
          });
        }
      });
  </script>
</body>
</html>
